<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SPD // ENG MODULE v12</title>

<style>
body {
  margin:0;
  background:#05070b;
  color:#cfe8ff;
  font-family:Arial;
}

.header {
  padding:10px;
  background:#0b1220;
  text-align:center;
}

.container {
  display:flex;
  padding:10px;
  gap:10px;
}

.panel {
  flex:1;
  background:#0e1a2b;
  padding:10px;
}

input {
  width:100%;
  margin:5px 0;
  padding:6px;
  background:#0a0f18;
  border:1px solid #1f3b5c;
  color:#cfe8ff;
}

button {
  width:100%;
  padding:8px;
  margin-top:8px;
  background:#1f3b5c;
  color:white;
  border:none;
}

#output {
  white-space:pre-wrap;
  font-size:12px;
  background:#0a0f18;
  padding:10px;
  height:260px;
  overflow:auto;
}
</style>
</head>

<body>

<div class="header">⚡ ENG MODULE // ENERGY RESILIENCE COCKPIT v12</div>

<div class="container">

  <!-- INPUT PANEL -->
  <div class="panel">
    <b>STATE INPUT</b><br>

    Oil Price
    <input id="oilPrice" type="number" value="80">

    CPO Price
    <input id="cpoPrice" type="number" value="1100">

    Fiscal Pressure (0–1)
    <input id="fiscalPressure" type="number" step="0.1" value="0.5">

    Reserve Level (0–1)
    <input id="reserveLevel" type="number" step="0.1" value="0.6">

    Import Dependency (0–1)
    <input id="importDependency" type="number" step="0.1" value="0.4">

    Biofuel Capacity (0–1)
    <input id="biofuelCapacity" type="number" step="0.1" value="0.6">

    <button onclick="runEngine()">RUN ENGINE</button>
    <button onclick="injectShock()">SIMULATE SHOCK</button>
    <button onclick="reset()">RESET</button>
  </div>

  <!-- OUTPUT PANEL -->
  <div class="panel">
    <b>ENGINE OUTPUT</b><br>
    <div id="output">SYSTEM READY</div>
  </div>

</div>

<script>

/* -----------------------
   STATE ENGINE
----------------------- */
let state = {};

function readState(){
  state = {
    oilPrice: Number(document.getElementById("oilPrice").value),
    cpoPrice: Number(document.getElementById("cpoPrice").value),
    fiscalPressure: Number(document.getElementById("fiscalPressure").value),
    reserveLevel: Number(document.getElementById("reserveLevel").value),
    importDependency: Number(document.getElementById("importDependency").value),
    biofuelCapacity: Number(document.getElementById("biofuelCapacity").value)
  };
}

/* -----------------------
   CORE ENGINE LOGIC
----------------------- */
function runEngine(){

  readState();

  let risk = 0;

  // FX-style pressure mapping
  risk += state.oilPrice / 100;
  risk += state.cpoPrice / 2000;
  risk += state.fiscalPressure * 30;
  risk += (1 - state.reserveLevel) * 40;
  risk += state.importDependency * 30;
  risk -= state.biofuelCapacity * 20;

  let status = "STABLE";

  if(risk > 80) status = "CRITICAL";
  else if(risk > 50) status = "ELEVATED";
  else if(risk > 30) status = "WATCH";
  else status = "STABLE";

  document.getElementById("output").innerText =
`🧠 ENERGY ENGINE RESULT

RISK SCORE: ${risk.toFixed(2)}
STATUS: ${status}

BREAKDOWN:
- Oil Pressure: ${state.oilPrice}
- CPO Pressure: ${state.cpoPrice}
- Fiscal Stress: ${state.fiscalPressure}
- Reserves: ${state.reserveLevel}
- Import Dependency: ${state.importDependency}
- Biofuel Capacity: ${state.biofuelCapacity}
`;
}

/* -----------------------
   SHOCK SIMULATION
----------------------- */
function injectShock(){
  document.getElementById("oilPrice").value = 120;
  document.getElementById("fiscalPressure").value = 0.8;
  runEngine();
}

/* -----------------------
   RESET
----------------------- */
function reset(){
  document.getElementById("oilPrice").value = 80;
  document.getElementById("cpoPrice").value = 1100;
  document.getElementById("fiscalPressure").value = 0.5;
  document.getElementById("reserveLevel").value = 0.6;
  document.getElementById("importDependency").value = 0.4;
  document.getElementById("biofuelCapacity").value = 0.6;

  document.getElementById("output").innerText = "SYSTEM RESET";
}

</script>

</body>
</html>
