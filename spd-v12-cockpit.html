<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sextant Resilience Operations Console</title>

<style>

* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: Arial, Helvetica, sans-serif;
}

body {
    background: #050b14;
    color: #e6f1ff;
    min-height: 100vh;
}


/* HEADER */

.header {
    background: #081525;
    border-bottom: 1px solid #1e3a5f;
    padding: 15px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.logo {
    font-size: 20px;
    font-weight: bold;
    letter-spacing: 1px;
}

.version {
    font-size: 12px;
    color: #7fb3ff;
}


/* STATUS BAR */

.status-bar {

    display:flex;
    justify-content:space-around;
    flex-wrap:wrap;

    background:#0b1d33;
    padding:10px;
    border-bottom:1px solid #1e3a5f;

}


.status-item {

    margin:5px;
    padding:8px 15px;
    border-radius:8px;
    background:#102944;

}


.status-label {

    font-size:11px;
    color:#9ab6d6;

}


.status-value {

    font-size:18px;
    font-weight:bold;

}



/* MAIN CONTROL ROOM */

.control-room {

    display:grid;

    grid-template-columns:
    1fr 2fr 1fr;

    gap:15px;

    padding:15px;

}



.panel {

    background:#091827;

    border:1px solid #1c3554;

    border-radius:12px;

    padding:15px;

    box-shadow:
    0 0 15px rgba(0,0,0,0.4);

}


.panel-title {

    font-size:14px;

    font-weight:bold;

    color:#79b7ff;

    margin-bottom:12px;

    border-bottom:
    1px solid #203b5d;

    padding-bottom:8px;

}



/* CENTRAL SIMULATION AREA */


.simulation-core {

    min-height:420px;

    display:flex;

    flex-direction:column;

    align-items:center;

    justify-content:center;

}


.core-circle {

    width:170px;

    height:170px;

    border-radius:50%;

    border:3px solid #2c7be5;

    display:flex;

    align-items:center;

    justify-content:center;

    text-align:center;

    font-size:20px;

    background:#071321;

}



.core-text {

    margin-top:15px;

    color:#9fc8ff;

}



/* NODE GRID */


.node-grid {

    display:grid;

    grid-template-columns:
    repeat(2,1fr);

    gap:10px;

}


.node {

    background:#102944;

    padding:12px;

    border-radius:8px;

    text-align:center;

    border:1px solid #24496f;

}


.node-name {

    font-size:13px;

}


.node-value {

    margin-top:5px;

    font-size:20px;

    font-weight:bold;

}



/* BUTTONS */


button {

    width:100%;

    margin-top:8px;

    padding:12px;

    border:none;

    border-radius:8px;

    background:#164a7d;

    color:white;

    cursor:pointer;

}


button:hover {

    background:#1d6bb5;

}



/* FOOTER */


.footer {

    text-align:center;

    padding:15px;

    font-size:12px;

    color:#7891ad;

}



/* MOBILE MODE */

@media(max-width:900px){

.control-room {

    grid-template-columns:1fr;

}


.simulation-core {

    min-height:300px;

}


}

</style>

</head>


<body>

<div class="logo">
🛰 SEXTANT RESILIENCE OPERATIONS CONSOLE
