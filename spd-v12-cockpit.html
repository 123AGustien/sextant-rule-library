<!DOCTYPE html>

<title>Sextant Resilience Operations Console</title>

<style>

* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: Arial, Helvetica, sans-serif;
}

body {
    background: #050b14;
    color: #e6f1ff;
    min-height: 100vh;
}


/* HEADER */

.header {
    background: #081525;
    border-bottom: 1px solid #1e3a5f;
    padding: 15px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.logo {
    font-size: 20px;
    font-weight: bold;
    letter-spacing: 1px;
}

.version {
    font-size: 12px;
    color: #7fb3ff;
}


/* STATUS BAR */

.status-bar {

    display:flex;
    justify-content:space-around;
    flex-wrap:wrap;

    background:#0b1d33;
    padding:10px;
    border-bottom:1px solid #1e3a5f;

}


.status-item {

    margin:5px;
    padding:8px 15px;
    border-radius:8px;
    background:#102944;

}


.status-label {

    font-size:11px;
    color:#9ab6d6;

}


.status-value {

    font-size:18px;
    font-weight:bold;

}



/* MAIN CONTROL ROOM */

.control-room {

    display:grid;

    grid-template-columns:
    1fr 2fr 1fr;

    gap:15px;

    padding:15px;

}



.panel {

    background:#091827;

    border:1px solid #1c3554;

    border-radius:12px;

    padding:15px;

    box-shadow:
    0 0 15px rgba(0,0,0,0.4);

}


.panel-title {

    font-size:14px;

    font-weight:bold;

    color:#79b7ff;

    margin-bottom:12px;

    border-bottom:
    1px solid #203b5d;

    padding-bottom:8px;

}



/* CENTRAL SIMULATION AREA */


.simulation-core {

    min-height:420px;

    display:flex;

    flex-direction:column;

    align-items:center;

    justify-content:center;

}


.core-circle {

    width:170px;

    height:170px;

    border-radius:50%;

    border:3px solid #2c7be5;

    display:flex;

    align-items:center;

    justify-content:center;

    text-align:center;

    font-size:20px;

    background:#071321;

}



.core-text {

    margin-top:15px;

    color:#9fc8ff;

}



/* NODE GRID */


.node-grid {

    display:grid;

    grid-template-columns:
    repeat(2,1fr);

    gap:10px;

}


.node {

    background:#102944;

    padding:12px;

    border-radius:8px;

    text-align:center;

    border:1px solid #24496f;

}


.node-name {

    font-size:13px;

}


.node-value {

    margin-top:5px;

    font-size:20px;

    font-weight:bold;

}



/* BUTTONS */


button {

    width:100%;

    margin-top:8px;

    padding:12px;

    border:none;

    border-radius:8px;

    background:#164a7d;

    color:white;

    cursor:pointer;

}


button:hover {

    background:#1d6bb5;

}



/* FOOTER */


.footer {

    text-align:center;

    padding:15px;

    font-size:12px;

    color:#7891ad;

}



/* MOBILE MODE */

@media(max-width:900px){

.control-room {

    grid-template-columns:1fr;

}


.simulation-core {

    min-height:300px;

}


}

</style>

</head>

<!-- ==============================
 SEXTANT SIMULATION CONTROLLER
 PART 3 - JAVASCRIPT ENGINE
================================ -->


<script>


const sextantState = {

    health:100,

    risk:"LOW",

    fx:0,

    liquidity:0,

    cyber:0,

    infrastructure:0,

    confidence:100

};



function updateDashboard(){


document.getElementById("shi").innerHTML =
sextantState.health;



document.getElementById("fxValue").innerHTML =
sextantState.fx;



document.getElementById("liqValue").innerHTML =
sextantState.liquidity;



document.getElementById("cyberValue").innerHTML =
sextantState.cyber;



document.getElementById("infraValue").innerHTML =
sextantState.infrastructure;



document.getElementById("confValue").innerHTML =
sextantState.confidence;



document.getElementById("rpValue").innerHTML =
sextantState.health;



document.getElementById("riskLevel").innerHTML =
sextantState.risk;



if(sextantState.health >=75){

document.getElementById("systemStatus").innerHTML =
"STABLE";

}

else if(sextantState.health >=45){

document.getElementById("systemStatus").innerHTML =
"WARNING";

}

else{

document.getElementById("systemStatus").innerHTML =
"CRITICAL";

}


}





function calculateRisk(){


let totalImpact =

sextantState.fx +

sextantState.liquidity +

sextantState.cyber +

sextantState.infrastructure;



sextantState.health =
Math.max(
0,
100 - Math.floor(totalImpact/2)
);



if(sextantState.health >=75){

sextantState.risk="LOW";

}

else if(sextantState.health >=45){

sextantState.risk="MEDIUM";

}

else if(sextantState.health >=25){

sextantState.risk="HIGH";

}

else{

sextantState.risk="CRITICAL";

}



sextantState.confidence =
Math.max(
0,
100-totalImpact
);


}





function runScenario(type){


resetValues();



if(type==="FX_SHOCK"){

sextantState.fx=70;

sextantState.liquidity=30;

sextantState.confidence-=20;

}



if(type==="BANK_STRESS"){

sextantState.liquidity=80;

sextantState.fx=20;

sextantState.confidence-=30;

}



if(type==="INFRA_FAILURE"){

sextantState.infrastructure=90;

sextantState.cyber=20;

sextantState.confidence-=40;

}



if(type==="CYBER_EVENT"){

sextantState.cyber=85;

sextantState.infrastructure=30;

sextantState.confidence-=25;

}



calculateRisk();

updateDashboard();



}




function resetValues(){


sextantState.fx=0;

sextantState.liquidity=0;

sextantState.cyber=0;

sextantState.infrastructure=0;


}



function resetSystem(){


sextantState.health=100;

sextantState.risk="LOW";

sextantState.confidence=100;


resetValues();


updateDashboard();


}



updateDashboard();


</script>

<!-- ==============================
 SEXTANT CASCADE ENGINE
 PART 4 - SCENARIO INTELLIGENCE LAYER
================================ -->


<script>


const scenarioLibrary = {


FX_SHOCK: {

name:"Currency Market Shock",

trigger:"Rapid FX volatility",

effects:{

FX:70,

Liquidity:30,

Confidence:-20

},

cascade:

"FX pressure → liquidity tightening → confidence reduction"

},



BANK_STRESS: {

name:"Banking System Stress",

trigger:"Liquidity disruption",

effects:{

Liquidity:80,

FX:20,

Confidence:-30

},

cascade:

"Liquidity shortage → lending constraint → market stress"

},



INFRA_FAILURE: {

name:"Critical Infrastructure Failure",

trigger:"Power or infrastructure outage",

effects:{

Infrastructure:90,

Cyber:20,

Confidence:-40

},

cascade:

"Power loss → service interruption → operational degradation"

},



CYBER_EVENT: {

name:"Cyber Security Incident",

trigger:"Digital system compromise",

effects:{

Cyber:85,

Infrastructure:30,

Confidence:-25

},

cascade:

"Cyber event → system isolation → service impact"

}


};




function runCascadeAnalysis(type){


let scenario = scenarioLibrary[type];


if(!scenario){

return;

}



let output = `

<b>ACTIVE SCENARIO</b><br>

${scenario.name}

<br><br>


<b>TRIGGER</b><br>

${scenario.trigger}

<br><br>


<b>CASCADE PATH</b><br>

${scenario.cascade}

<br><br>


<b>MITIGATION STATUS</b><br>

Simulation evaluating response capacity...

`;



document.getElementById("riskPanel").innerHTML += output;


}




// Enhanced scenario wrapper

const originalRunScenario = runScenario;


runScenario=function(type){


originalRunScenario(type);


runCascadeAnalysis(type);



generateDecisionSupport(type);


}




function generateDecisionSupport(type){


let advice="";


switch(type){


case "FX_SHOCK":

advice=

"Activate currency monitoring, liquidity buffers and confidence protection measures.";

break;



case "BANK_STRESS":

advice=

"Prioritize liquidity continuity, settlement stability and banking communication.";

break;



case "INFRA_FAILURE":

advice=

"Deploy infrastructure redundancy, backup power and operational recovery plans.";

break;



case "CYBER_EVENT":

advice=

"Isolate affected systems, verify integrity and maintain critical services.";

break;



}



document.getElementById("riskPanel").innerHTML +=

`

<br>

<b>DECISION SUPPORT</b><br>

${advice}

`;



}





</script>
