<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SPD v12.1 Cockpit Pro</title>

<style>

*{
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
margin:0;
padding:0;
}

body{

background:#050b14;
color:#e6f1ff;
min-height:100vh;

}


/* HEADER */

.header{

display:flex;
justify-content:space-between;
align-items:center;

background:#081525;

padding:15px;

border-bottom:1px solid #23466d;

}


.logo{

font-size:20px;
font-weight:bold;

}


.version{

font-size:12px;
color:#7fb3ff;

}



/* STATUS */

.status-bar{

display:flex;
justify-content:space-around;
flex-wrap:wrap;

background:#0b1d33;

padding:10px;

}


.status-card{

background:#102944;

padding:10px 18px;

border-radius:8px;

margin:5px;

text-align:center;

}


.label{

font-size:11px;
color:#9ab6d6;

}


.value{

font-size:22px;
font-weight:bold;

}



/* MAIN */

.cockpit{

display:grid;

grid-template-columns:
1fr 1.5fr 1fr;

gap:15px;

padding:15px;

}



.panel{

background:#091827;

border:1px solid #24496f;

border-radius:12px;

padding:15px;

}



.title{

color:#79b7ff;

font-weight:bold;

font-size:14px;

border-bottom:1px solid #24496f;

padding-bottom:8px;

margin-bottom:12px;

}



/* STRESS GRID */


.grid{

display:grid;

grid-template-columns:
repeat(2,1fr);

gap:10px;

}


.node{

background:#102944;

border-radius:8px;

padding:12px;

text-align:center;

}



.node-value{

font-size:22px;

font-weight:bold;

margin-top:5px;

}



/* CORE */


.core{

display:flex;

align-items:center;

justify-content:center;

flex-direction:column;

min-height:350px;

}


.core-circle{

height:170px;

width:170px;

border-radius:50%;

border:3px solid #2c7be5;

display:flex;

align-items:center;

justify-content:center;

text-align:center;

background:#071321;

font-size:22px;

}


.core-status{

margin-top:15px;

color:#9fc8ff;

}



/* BUTTONS */


button{

width:100%;

padding:12px;

margin-top:8px;

border:0;

border-radius:8px;

background:#164a7d;

color:white;

cursor:pointer;

}


button:hover{

background:#1d6bb5;

}



/* OUTPUT BOX */

.output{

margin-top:15px;

background:#071321;

padding:12px;

border-radius:8px;

line-height:1.6;

font-size:14px;

}



/* FOOTER */


.footer{

text-align:center;

padding:15px;

font-size:12px;

color:#7891ad;

}



/* MOBILE */

@media(max-width:900px){

.cockpit{

grid-template-columns:1fr;

}

}


</style>

</head>


<body>


<header class="header">

<div class="logo">
🛰 SPD v12.1 // COCKPIT PRO
</div>


<div class="version">
SEXTANT RESILIENCE ENGINE
</div>

</header>




<section class="status-bar">


<div class="status-card">

<div class="label">
SYSTEM
</div>

<div class="value" id="system">
STABLE
</div>

</div>



<div class="status-card">

<div class="label">
RISK
</div>

<div class="value" id="risk">
LOW
</div>

</div>



<div class="status-card">

<div class="label">
SHI
</div>

<div class="value" id="shi">
100
</div>

</div>


</section>





<section class="cockpit">



<!-- LEFT -->

<div class="panel">


<div class="title">
STRESS MONITOR
</div>


<div class="grid">


<div class="node">
FX STRESS

<div class="node-value" id="fx">
0
</div>

</div>


<div class="node">
DC LOAD

<div class="node-value" id="dc">
0
</div>

</div>


<div class="node">
CYBER EVENT

<div class="node-value" id="cyb">
0
</div>

</div>


<div class="node">
INFRA STRAIN

<div class="node-value" id="inf">
0
</div>

</div>


</div>

</div>





<!-- CENTER -->


<div class="panel core">


<div class="core-circle">

SEXTANT<br>
CORE

</div>


<div class="core-status">

Simulation Ready

</div>


</div>





<!-- RIGHT -->


<div class="panel">


<div class="title">
SCENARIO PANEL
</div>


<button onclick="injectScenario('FX')">
Financial Stress Injection
</button>


<button onclick="injectScenario('INF')">
Infrastructure Failure
</button>


<button onclick="injectScenario('CYB')">
Cyber Event
</button>


<button onclick="resetSystem()">
RESET
</button>



</div>


</section>





<section class="panel" style="margin:15px;">


<div class="title">
RISK PANEL
</div>


<div id="riskOutput" class="output">

Awaiting scenario injection...

</div>


</section>





<footer class="footer">

Sextant Protocol™ | Defensive Resilience Simulation Framework

</footer>
