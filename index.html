<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SPD v12 // Autonomous Cockpit</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: radial-gradient(circle at center, #070b12, #020409);
  color: #cfe8ff;
}

.header {
  padding: 14px;
  background: #0b1220;
  text-align: center;
  font-weight: bold;
  letter-spacing: 1px;
}

.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  padding: 10px;
}

.card {
  background: #0d1626;
  border: 1px solid #1c2a44;
  border-radius: 8px;
  padding: 12px;
}

button {
  background: #1f3b63;
  color: #cfe8ff;
  border: none;
  padding: 8px;
  margin-top: 6px;
  border-radius: 6px;
  cursor: pointer;
}

button:hover {
  background: #2a568f;
}

.status {
  font-size: 13px;
  margin-top: 6px;
  opacity: 0.9;
}

.log {
  height: 120px;
  overflow-y: auto;
  font-size: 12px;
  background: #050a12;
  padding: 6px;
  border-radius: 6px;
  border: 1px solid #1c2a44;
}

canvas {
  width: 100%;
  height: 160px;
  background: #050a12;
  border-radius: 6px;
  border: 1px solid #1c2a44;
}
</style>
</head>

<body>

<div class="header">
SPD v12 AUTONOMOUS COCKPIT // FULL REBUILD
</div>

<div class="grid">

<!-- RULE ENGINE -->
<div class="card">
<h3>Rule Engine</h3>
<button onclick="runRules()">Run Rules</button>
<div class="log" id="ruleLog"></div>
</div>

<!-- ENERGY MODULE -->
<div class="card">
<h3>Energy Module</h3>
<div class="status" id="energyStatus">Load: 72% | Stability: Nominal</div>
<button onclick="toggleSpike()">Toggle Load Spike</button>
</div>

<!-- RISK GRAPH -->
<div class="card">
<h3>Risk Graph</h3>
<canvas id="riskCanvas"></canvas>
<button onclick="updateRisk()">Update Risk</button>
</div>

<!-- SOLUTION ENGINE -->
<div class="card">
<h3>Solution Engine</h3>
<button onclick="generateSolution()">Generate Solutions</button>
<div class="log" id="solutionLog"></div>
</div>

</div>

<script>
let load = 72;
let spike = false;
let riskData = [30, 40, 35, 50, 60];

function log(id, msg) {
  document.getElementById(id).innerHTML += msg + "<br>";
}

function runRules() {
  log("ruleLog", "RULE_ENGINE: scanning system state...");
  log("ruleLog", "RULE_01: energy stability check → OK");
  log("ruleLog", "RULE_02: risk threshold evaluation → NOMINAL");
  log("ruleLog", "RULE_03: system integrity → PASS");
}

function toggleSpike() {
  spike = !spike;
  load = spike ? 92 : 72;

  document.getElementById("energyStatus").innerText =
    "Load: " + load + "% | Stability: " + (spike ? "HIGH VARIANCE" : "Nominal");
}

function updateRisk() {
  riskData.push(Math.floor(Math.random() * 100));
  if (riskData.length > 8) riskData.shift();
  drawRisk();
}

function drawRisk() {
  const c = document.getElementById("riskCanvas");
  const ctx = c.getContext("2d");
  c.width = c.clientWidth;
  c.height = 160;

  ctx.clearRect(0, 0, c.width, c.height);
  ctx.strokeStyle = "#4cc9f0";
  ctx.beginPath();

  let step = c.width / (riskData.length - 1);
  riskData.forEach((v, i) => {
    let x = i * step;
    let y = c.height - (v / 100) * c.height;
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  });

  ctx.stroke();
}

function generateSolution() {
  let solutions = [
    "Reduce load by 12% to stabilize energy grid",
    "Activate fallback routing protocol",
    "Increase buffer threshold for risk module",
    "Deploy predictive dampening algorithm",
    "Switch to hybrid stabilization mode"
  ];

  let pick = solutions[Math.floor(Math.random() * solutions.length)];
  log("solutionLog", "SOLUTION_ENGINE → " + pick);
}

// init
drawRisk();
</script>

</body>
</html>
