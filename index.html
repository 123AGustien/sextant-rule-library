<!DOCTYPE html>
<html>
<head>
  <title>Sextant Simulation Console</title>

  <style>
    body {
      font-family: Arial;
      background: #0b0f1a;
      color: #ffffff;
      margin: 0;
      padding: 20px;
    }

    .panel {
      border: 1px solid #2a2f3a;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 8px;
      background: #111827;
    }

    button {
      padding: 10px;
      margin: 5px;
      cursor: pointer;
      background: #1f2937;
      color: white;
      border: 1px solid #374151;
      border-radius: 5px;
    }

    button:hover {
      background: #374151;
    }

    .green { color: #00ff88; }
    .yellow { color: #ffd000; }
    .orange { color: #ff8800; }
    .red { color: #ff3b3b; }
  </style>
</head>

<body>

<h1>Sextant Protocol Simulation Console</h1>

<div class="panel">
  <h2>Scenario Selection</h2>

  <button onclick="runScenario('FIN-001')">FX Stress (FIN-001)</button>
  <button onclick="runScenario('DC-001')">Cooling Failure (DC-001)</button>
  <button onclick="runScenario('CYB-001')">Ransomware (CYB-001)</button>
  <button onclick="runScenario('INF-001')">Network Outage (INF-001)</button>

</div>

<div class="panel">
  <h2>Simulation Output</h2>
  <div id="output">Select a scenario to begin simulation</div>
</div>

<script src="engine.js"></script>

</body>
</html>
