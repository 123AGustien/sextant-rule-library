<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SPD v12 // GRID AUTONOMOUS COCKPIT</title>

<style>
body {
  margin: 0;
  background: #05070b;
  color: #cfe8ff;
  font-family: Arial;
  overflow: hidden;
}

.header {
  padding: 10px;
  background: #0b1220;
  text-align: center;
  font-weight: bold;
}

#canvas {
  display: block;
  margin: 0 auto;
  background: radial-gradient(circle at center, #0b1a2e, #020409);
}

.panel {
  position: absolute;
  top: 60px;
  left: 10px;
  width: 260px;
  background: rgba(10,18,30,0.85);
  padding: 10px;
  font-size: 12px;
  border: 1px solid #1f3550;
}
</style>
</head>

<body>

<div class="header">
SPD v12 GRID COCKPIT // MULTI-ZONE ENERGY + RISK FLOW
</div>

<canvas id="canvas" width="1000" height="600"></canvas>

<div class="panel" id="panel">
LOADING SYSTEM...
</div>

<script>
/* =========================
   GRID SYSTEM (5 ZONES)
========================= */

const nodes = [
  { id:"A", energy:0.8, stability:0.7, risk:0.2, x:200, y:150 },
  { id:"B", energy:0.6, stability:0.8, risk:0.25, x:400, y:100 },
  { id:"C", energy:0.9, stability:0.6, risk:0.35, x:600, y:200 },
  { id:"D", energy:0.4, stability:0.9, risk:0.15, x:300, y:350 },
  { id:"E", energy:0.7, stability:0.75, risk:0.3, x:650, y:400 }
];

/* connections (energy flow graph) */
const links = [
  ["A","B"],
  ["B","C"],
  ["C","E"],
  ["A","D"],
  ["D","E"],
  ["B","D"]
];

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

/* =========================
   CORE MATH ENGINE
========================= */

function clamp(v,min,max){ return Math.max(min, Math.min(max,v)); }

/* energy diffusion between nodes */
function transferEnergy(a,b){
  let diff = a.energy - b.energy;
  let flow = diff * 0.02;

  a.energy -= flow;
  b.energy += flow;
}

/* risk propagation */
function propagateRisk(a,b){
  let pressure = (a.energy * (1 - a.stability));
  b.risk += pressure * 0.01;
}

/* stability decay */
function updateStability(n){
  let volatility = Math.abs(n.energy - (n.prevEnergy || n.energy));
  n.stability -= volatility * 0.5;
  n.stability += 0.01; // recovery bias

  n.stability = clamp(n.stability, 0, 1);
}

/* risk engine */
function updateRisk(n){
  n.risk = (n.energy * n.energy) / (n.stability + 0.1);
  n.risk = clamp(n.risk, 0, 1);
}

/* rule engine */
function rules(n){
  if(n.energy > 0.9){
    n.stability -= 0.02;
  }

  if(n.risk > 0.7){
    n.energy *= 0.98;
    n.stability -= 0.03;
  }

  if(n.stability < 0.3){
    n.energy *= 0.97;
  }

  n.energy = clamp(n.energy,0,1);
}

/* =========================
   SIMULATION LOOP
========================= */

function step(){

  // store previous state
  nodes.forEach(n => n.prevEnergy = n.energy);

  // energy transfer
  links.forEach(([aId,bId])=>{
    let a = nodes.find(n=>n.id===aId);
    let b = nodes.find(n=>n.id===bId);
    transferEnergy(a,b);
  });

  // update physics per node
  nodes.forEach(n=>{
    updateStability(n);
    updateRisk(n);
    rules(n);
  });

  // risk propagation across graph
  links.forEach(([aId,bId])=>{
    let a = nodes.find(n=>n.id===aId);
    let b = nodes.find(n=>n.id===bId);
    propagateRisk(a,b);
  });

  render();
  updatePanel();
}

/* =========================
   RENDER GRID
========================= */

function render(){

  ctx.clearRect(0,0,1000,600);

  // links
  ctx.strokeStyle = "#1f3b5c";
  ctx.lineWidth = 2;

  links.forEach(([aId,bId])=>{
    let a = nodes.find(n=>n.id===aId);
    let b = nodes.find(n=>n.id===bId);

    ctx.beginPath();
    ctx.moveTo(a.x,a.y);
    ctx.lineTo(b.x,b.y);
    ctx.stroke();
  });

  // nodes
  nodes.forEach(n=>{

    let heat = n.energy;
    let riskGlow = n.risk * 255;

    ctx.beginPath();
    ctx.arc(n.x,n.y,18,0,Math.PI*2);

    ctx.fillStyle = `rgba(${Math.floor(heat*255)},120,255,0.9)`;
    ctx.fill();

    ctx.strokeStyle = `rgba(255,${255-riskGlow},100,0.8)`;
    ctx.stroke();

    ctx.fillStyle = "#cfe8ff";
    ctx.font = "12px Arial";
    ctx.fillText(
      `${n.id} E:${n.energy.toFixed(2)} R:${n.risk.toFixed(2)}`,
      n.x - 40,
      n.y - 25
    );
  });
}

/* =========================
   CONTROL PANEL
========================= */

function updatePanel(){

  let avgEnergy = nodes.reduce((a,b)=>a+b.energy,0)/nodes.length;
  let avgRisk = nodes.reduce((a,b)=>a+b.risk,0)/nodes.length;

  document.getElementById("panel").innerHTML = `
  <b>GRID STATUS</b><br><br>

  Avg Energy: ${avgEnergy.toFixed(2)}<br>
  Avg Risk: ${avgRisk.toFixed(2)}<br><br>

  NODE STATES:<br>
  ${nodes.map(n=>
    `${n.id}: E ${n.energy.toFixed(2)} | S ${n.stability.toFixed(2)} | R ${n.risk.toFixed(2)}`
  ).join("<br>")}

  <br><br>
  SYSTEM MODE: AUTONOMOUS GRID FLOW
  `;
}

/* =========================
   START ENGINE
========================= */

setInterval(step, 200);

render();

</script>
</body>
</html>
