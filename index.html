<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SPD SAFE RESTORE</title>

<style>
body { margin:0; background:#05070b; color:#cfe8ff; font-family:Arial; }
.top { padding:10px; background:#0a111a; }
.grid { display:flex; height:calc(100vh - 40px); }

.left { width:200px; padding:10px; background:#070d14; }
.center { flex:1; display:flex; justify-content:center; align-items:center; }
.right { width:240px; padding:10px; background:#070d14; }

button {
  width:100%;
  margin:5px 0;
  padding:8px;
  background:#0f1b28;
  color:white;
  border:1px solid #223548;
}

canvas { background:#071019; border:1px solid #1c2c3c; }
</style>
</head>

<body>

<div class="top">🛰 SPD COCKPIT // SAFE MODE (ENGINE CHECK)</div>

<div class="grid">

  <div class="left">
    <button onclick="run('FX')">FX STRESS</button>
    <button onclick="run('DC')">DC LOAD</button>
    <button onclick="run('CYB')">CYBER EVENT</button>
    <button onclick="run('INF')">INFRA STRAIN</button>
    <button onclick="reset()">RESET</button>
  </div>

  <div class="center">
    <canvas id="g" width="400" height="250"></canvas>
  </div>

  <div class="right" id="log"></div>

</div>

<script>
let s = {FX:0,DC:0,CYB:0,INF:0};
let log = [];

function write(m){
  log.push(m);
  document.getElementById("log").innerHTML = log.slice(-10).join("<br>");
}

function run(t){
  s[t] += 2;
  write("EVENT "+t);
  draw();
}

function reset(){
  s={FX:0,DC:0,CYB:0,INF:0};
  write("RESET");
  draw();
}

function draw(){
  const c=document.getElementById("g");
  const x=c.getContext("2d");
  x.clearRect(0,0,400,250);

  let k=Object.keys(s);
  let v=Object.values(s);
  let m=Math.max(...v,5);

  k.forEach((a,i)=>{
    let h=(v[i]/m)*200;
    x.fillStyle="#00ffd5";
    x.fillRect(50+i*80,220-h,30,h);
    x.fillStyle="#fff";
    x.fillText(a,50+i*80,240);
  });
}

draw();
</script>

</body>
</html>
