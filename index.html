<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>SPD Control System</title>

<style>
body {
  margin: 0;
  background: #070b10;
  color: #e6f1ff;
  font-family: Arial, sans-serif;
  overflow: hidden;
}

/* HEADER */
.header {
  padding: 12px 20px;
  background: #0e1620;
  border-bottom: 1px solid #1f2d3a;
  display: flex;
  justify-content: space-between;
  font-size: 14px;
}

/* MAIN GRID */
.grid {
  display: grid;
  grid-template-columns: 220px 1fr 260px;
  height: calc(100vh - 45px);
}

/* LEFT PANEL */
.left {
  background: #0b1118;
  border-right: 1px solid #1f2d3a;
  padding: 10px;
}

button {
  width: 100%;
  margin-bottom: 8px;
  padding: 10px;
  background: #14202c;
  border: 1px solid #263a4d;
  color: white;
  cursor: pointer;
}

button:hover {
  background: #1b2c3b;
}

/* CENTER */
.center {
  padding: 10px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

canvas {
  background: #0c141d;
  border: 1px solid #223344;
}

/* RIGHT PANEL */
.right {
  background: #0b1118;
  border-left: 1px solid #1f2d3a;
  padding: 10px;
  font-size: 12px;
  overflow-y: auto;
}

.log {
  opacity: 0.85;
  line-height: 1.4;
}
</style>
</head>

<body>

<div class="header">
  <div>🛰 SPD CONTROL SYSTEM · LIVE</div>
  <div>STATUS: RUNNING</div>
</div>

<div class="grid">

  <!-- LEFT -->
  <div class="left">
    <button onclick="runScenario('FX')">FX STRESS</button>
    <button onclick="runScenario('DC')">DC LOAD</button>
    <button onclick="runScenario('CYB')">CYBER EVENT</button>
    <button onclick="runScenario('INF')">INFRA STRAIN</button>
  </div>

  <!-- CENTER -->
  <div class="center">
    <canvas id="graph" width="420" height="260"></canvas>
  </div>

  <!-- RIGHT -->
  <div class="right">
    <div class="log" id="log"></div>
  </div>

</div>

<script>
let state = { FX: 0, DC: 0, CYB: 0, INF: 0 };
let log = [];

function runScenario(type) {
  state[type] += 2;
  pushLog("SCENARIO", type);
  updateGraph();
}

function pushLog(tag, msg) {
  log.push(`${tag}: ${msg}`);
  document.getElementById("log").innerHTML =
    log.slice(-12).join("<br>");
}

function updateGraph() {
  const c = document.getElementById("graph");
  const x = c.getContext("2d");

  x.clearRect(0, 0, c.width, c.height);

  const keys = Object.keys(state);
  const vals = Object.values(state);
  const max = Math.max(...vals, 5);

  keys.forEach((k, i) => {
    const bar = (vals[i] / max) * 200;

    const xPos = 70 + i * 90;

    x.fillStyle = "#00ffd5";
    x.fillRect(xPos, 220 - bar, 40, bar);

    x.fillStyle = "#fff";
    x.fillText(k, xPos + 8, 240);
  });
}

updateGraph();
</script>

</body>
</html>
