<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SPD v11 LIVE | Resilience Simulation Console</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#0b0f1a;
    color:#e6edf3;
}

.header{
    padding:18px;
    background:#0f172a;
    border-bottom:1px solid #1f2937;
    font-size:20px;
    font-weight:bold;
}

.status-bar{
    padding:10px 18px;
    background:#111827;
    color:#34d399;
    border-bottom:1px solid #1f2937;
    font-size:13px;
}

.health-strip{
    display:flex;
    justify-content:space-between;
    padding:10px 18px;
    font-size:12px;
    color:#9ca3af;
}

.online{color:#34d399;}
.warn{color:#fbbf24;}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:16px;
    padding:16px;
}

.panel{
    background:#111827;
    border:1px solid #1f2937;
    border-radius:12px;
    padding:14px;
}

button{
    margin:6px;
    padding:8px;
    background:#0b1220;
    color:white;
    border:1px solid #374151;
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    border-color:#60a5fa;
}

#output,#audit,#diag{
    background:#0b1220;
    border-radius:8px;
    padding:10px;
    min-height:80px;
    font-size:12px;
}

canvas{
    width:100%;
    height:220px;
    background:#0b1220;
    border-radius:8px;
}
</style>

</head>

<body>

<div class="header">🛰 SPD PILOT SYSTEM · v11</div>

<div class="status-bar">
SYSTEM ONLINE | Simulation Kernel Active
</div>

<div class="health-strip">
<div>FX: <span class="online">ONLINE</span></div>
<div>DC: <span class="online">STABLE</span></div>
<div>CYB: <span class="warn">MONITORING</span></div>
<div>INF: <span class="online">READY</span></div>
</div>

<div class="grid">

<div class="panel">
<h2>Core Engine</h2>
<button onclick="runScenario('FX')">FX</button>
<button onclick="runScenario('DC')">DC</button>
<button onclick="runScenario('CYB')">CYB</button>
<button onclick="runScenario('INF')">INF</button>
</div>

<div class="panel">
<h2>Events</h2>
<button onclick="injectEvent('FX_SPIKE')">FX Spike</button>
<button onclick="injectEvent('BOND_STRESS')">Bond</button>
<button onclick="injectEvent('CYBER_ATTACK')">Cyber</button>
<button onclick="injectEvent('INFRA_FAILURE')">Infra</button>
</div>

<div class="panel">
<h2>Output</h2>
<div id="output">READY</div>
</div>

<div class="panel">
<h2>Graph</h2>
<canvas id="graph"></canvas>
</div>

<div class="panel">
<h2>Diagnostics</h2>
<pre id="diag">Idle</pre>
</div>

<div class="panel">
<h2>Audit</h2>
<button onclick="showAudit()">Show</button>
<button onclick="clearAudit()">Clear</button>
<pre id="audit"></pre>
</div>

</div>

<!-- IMPORTANT LOAD ORDER -->
<script src="engine-core.js"></script>
<script src="engine-ui.js"></script>
<script src="cascade-graph.js"></script>
<script src="boot.js"></script>

</body>
</html>
