<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SPD // SCENARIO SYSTEM CORE</title>

<style>
body { margin:0; background:#05070b; color:#cfe8ff; font-family:Arial; }

.header {
  padding:10px;
  background:#0b1220;
  text-align:center;
  font-weight:bold;
}

#statusBar {
  text-align:center;
  padding:6px;
  background:#0a0f18;
  transition:0.3s;
}

.panel {
  display:flex;
  justify-content:space-around;
  padding:10px;
}

.card {
  background:#0e1a2b;
  width:18%;
  padding:12px;
  text-align:center;
}

.value { font-size:24px; }

#graph {
  position:relative;
  height:260px;
}

.node {
  position:absolute;
  width:60px;
  height:60px;
  border-radius:50%;
  background:#1f3b5c;
  display:flex;
  align-items:center;
  justify-content:center;
  transition: transform 0.2s;
  cursor:pointer;
}

button {
  margin:3px;
  padding:7px;
  background:#1f3b5c;
  color:white;
  border:none;
  cursor:pointer;
}

#log {
  position:absolute;
  right:10px;
  top:60px;
  width:260px;
  height:260px;
  background:#0a0f18;
  font-size:11px;
  overflow:auto;
  padding:10px;
}
</style>
</head>

<body>

<div class="header">🛰 SPD SCENARIO ENGINE // FULL RESTORE</div>
<div id="statusBar">STATUS: NOMINAL</div>

<div class="panel">
  <div class="card">FX<div id="FX" class="value">0</div></div>
  <div class="card">DC<div id="DC" class="value">0</div></div>
  <div class="card">CYB<div id="CYB" class="value">0</div></div>
  <div class="card">INF<div id="INF" class="value">0</div></div>
</div>

<div id="graph">
  <div class="node" onclick="inject('FX')" style="left:80px;top:90px;">FX</div>
  <div class="node" onclick="inject('DC')" style="left:220px;top:40px;">DC</div>
  <div class="node" onclick="inject('CYB')" style="left:360px;top:90px;">CYB</div>
  <div class="node" onclick="inject('INF')" style="left:220px;top:150px;">INF</div>
</div>

<div style="text-align:center;">
  <button onclick="scenario('FX_SHOCK')">FX SHOCK</button>
  <button onclick="scenario('CYBER')">CYBER</button>
  <button onclick="scenario('INFRA')">INFRA</button>
  <button onclick="scenario('STABILISE')">STABILISE</button>
  <button onclick="reset()">RESET</button>
</div>

<div id="log">SYSTEM READY</div>

<script>

const state = {
  FX:{v:0},
  DC:{v:0},
  CYB:{v:0},
  INF:{v:0}
};

const LINKS = [
  ["FX","DC",0.9],
  ["DC","CYB",0.7],
  ["CYB","INF",0.8],
  ["INF","FX",0.6]
];

let log = [];

/* direct injection */
function inject(n){
  state[n].v += 10;
  log.push(n + " +10");
}

/* scenario engine */
function scenario(type){

  if(type === "FX_SHOCK"){
    state.FX.v += 25;
    log.push("SCENARIO: FX SHOCK");
  }

  if(type === "CYBER"){
    state.CYB.v += 25;
    log.push("SCENARIO: CYBER EVENT");
  }

  if(type === "INFRA"){
    state.INF.v += 25;
    log.push("SCENARIO: INFRA FAILURE");
  }

  if(type === "STABILISE"){
    for(let k in state){
      state[k].v *= 0.6;
    }
    log.push("SCENARIO: STABILISATION");
  }
}

/* propagation model */
function cascade(){
  LINKS.forEach(([a,b,w])=>{
    const pressure = state[a].v * w;
    if(Math.random() < pressure / 150){
      state[b].v += Math.random()*3;
      log.push(a + " → " + b);
    }
  });
}

/* decay */
function decay(){
  for(let k in state){
    state[k].v *= 0.98;
  }
}

/* status system */
function statusCheck(){

  let total = 0;
  for(let k in state) total += state[k].v;

  const bar = document.getElementById("statusBar");

  if(total > 200){
    bar.innerText = "STATUS: STRESSED";
    bar.style.background = "#3a0f0f";
  }
  else if(total > 100){
    bar.innerText = "STATUS: ELEVATED";
    bar.style.background = "#3a2a0f";
  }
  else{
    bar.innerText = "STATUS: NOMINAL";
    bar.style.background = "#0a0f18";
  }
}

/* render */
function render(){

  document.getElementById("FX").innerText = state.FX.v.toFixed(1);
  document.getElementById("DC").innerText = state.DC.v.toFixed(1);
  document.getElementById("CYB").innerText = state.CYB.v.toFixed(1);
  document.getElementById("INF").innerText = state.INF.v.toFixed(1);

  document.querySelectorAll(".node").forEach(n=>{
    const key = n.innerText;
    n.style.transform = `scale(${1 + state[key].v / 70})`;
  });

  document.getElementById("log").innerHTML =
    log.slice(-12).join("<br>");
}

/* reset */
function reset(){
  for(let k in state) state[k].v = 0;
  log = [];
}

/* main loop */
function tick(){
  cascade();
  decay();
  statusCheck();
  render();
}

render();
setInterval(tick, 900);

</script>

</body>
</html>
