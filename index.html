<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SPD v12 // AUTONOMOUS COCKPIT v2</title>

<style>
body {
  margin: 0;
  background: radial-gradient(circle at center, #070b12, #020409);
  color: #cfe8ff;
  font-family: Arial, sans-serif;
}

.header {
  padding: 12px;
  background: #0c1624;
  border-bottom: 1px solid #223447;
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-size:13px;
}

.grid {
  display:grid;
  grid-template-columns: 1.2fr 1fr;
  height: calc(100vh - 50px);
}

.panel {
  padding:12px;
  border-right:1px solid #1b2a3a;
  overflow:auto;
}

.right { background:#060a10; }

button {
  background:#132235;
  color:#cfe8ff;
  border:1px solid #2b425a;
  padding:8px;
  margin:4px;
  cursor:pointer;
  border-radius:4px;
}

button:hover { background:#1b3550; }

.badge {
  padding:4px 8px;
  background:#0f2a1f;
  border:1px solid #1f5a3a;
  color:#6dffb3;
  font-size:12px;
}

.stateBox,.log {
  background:#05070b;
  padding:10px;
  border:1px solid #1b2a3a;
  font-size:12px;
  white-space:pre-wrap;
}

.ruleTitle {
  color:#6dffb3;
  font-weight:bold;
  margin-bottom:6px;
}

.ruleItem { margin:3px 0; }

canvas {
  background:#05070b;
  border:1px solid #1b2a3a;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="header">
🛰 SPD v12 // AUTONOMOUS COCKPIT v2
<span id="status" class="badge">SYSTEM ONLINE</span>
</div>

<div class="grid">

<!-- LEFT -->
<div class="panel">

<h3>⚙ Scenario Engine</h3>

<button onclick="runScenario('FX')">FX SHOCK</button>
<button onclick="runScenario('DC')">DATA CENTER</button>
<button onclick="runScenario('CYB')">CYBER EVENT</button>
<button onclick="runScenario('INF')">INFRA FAILURE</button>

<button onclick="resetSystem()">RESET</button>

<h3>📊 State</h3>
<pre id="stateBox" class="stateBox"></pre>

<h3>📘 Rules</h3>
<div id="ruleGuide" class="stateBox"></div>

<h3>🧠 Solutions</h3>
<div id="solutionPanel" class="stateBox"></div>

<h3>🧩 ACTION CONTROLS</h3>
<div id="actionPanel" class="stateBox"></div>

<h3>🚨 AUTO SUGGEST v2</h3>
<div id="autoSuggestPanel" class="stateBox"></div>

<h3>📊 Graph</h3>
<canvas id="riskGraph" width="520" height="220"></canvas>

</div>

<!-- RIGHT -->
<div class="panel right">
<h3>📡 Audit Log</h3>
<div id="log" class="log"></div>
</div>

</div>

<script>

/* ---------------- STATE ---------------- */
let state = { FX:0, DC:0, CYB:0, INF:0 };
let log = [];

/* ---------------- RULES ---------------- */
const rules = {
FX:["Volatility","Outflow","Liquidity","Confidence"],
DC:["Load","Cooling","Power","Redundancy"],
CYB:["Alert","Compromise","Attack","Containment"],
INF:["Failure","Services","Dependency","Restore"]
};

/* ---------------- SOLUTIONS ---------------- */
const solutions = {
FX:["STABLE","WATCH","DEGRADED","CRITICAL"],
DC:["STABLE","WATCH","DEGRADED","CRITICAL"],
CYB:["STABLE","WATCH","DEGRADED","CRITICAL"],
INF:["STABLE","WATCH","DEGRADED","CRITICAL"]
};

/* ---------------- ACTIONS ---------------- */
const actionsMap = {
FX:["Inject Liquidity Support","Hedge FX Exposure","Stabilise Currency"],
DC:["Throttle Compute Load","Boost Cooling","Redistribute Servers"],
CYB:["Isolate Systems","Run Forensics","Enable Incident Response"],
INF:["Activate Backup Grid","Reroute Services","Engage Recovery"]
};

/* ---------------- AUTO SUGGEST v2 ---------------- */
function updateAutoSuggest(){

  const panel = document.getElementById("autoSuggestPanel");
  if(!panel) return;

  const weights = { FX:1.2, DC:1.0, CYB:1.5, INF:1.3 };

  let score = {};
  let total = 0;

  for(let k in state){
    score[k] = state[k] * weights[k];
    total += score[k];
  }

  const sorted = Object.entries(score).sort((a,b)=>b[1]-a[1]);

  function priority(v){
    if(v>=18) return "P0 CRITICAL";
    if(v>=12) return "P1 HIGH";
    if(v>=6) return "P2 MEDIUM";
    return "P3 LOW";
  }

  let html = `<div class='ruleTitle'>TOTAL RISK: ${total.toFixed(2)}</div>`;

  sorted.forEach(([k,v])=>{
    html += `<div class='ruleTitle'>${k} → ${priority(v)}</div>`;
    html += `<div class='ruleItem'>Risk: ${v.toFixed(2)}</div>`;

    (actionsMap[k]||[]).forEach(a=>{
      html += `<div class='ruleItem'>⚡ ${a}</div>`;
    });

    html += "<br>";
  });

  panel.innerHTML = html;
}

/* ---------------- ACTION ENGINE ---------------- */
function applyAction(type,index){

  state[type] = Math.max(0, state[type]-2);

  log.push(`${new Date().toISOString()} | ACTION | ${type}:${index}`);

  updateRuleGuide(type);
  updateSolutionPanel();
  updateAutoSuggest();
  updateActionPanel();

  render();
}

/* ---------------- ACTION PANEL ---------------- */
function updateActionPanel(){

  const panel = document.getElementById("actionPanel");
  if(!panel) return;

  let html = "";

  for(let k in actionsMap){

    html += `<div class='ruleTitle'>${k} ACTIONS</div>`;

    actionsMap[k].forEach((a,i)=>{
      html += `<button onclick="applyAction('${k}',${i})">${a}</button>`;
    });

    html += "<br><br>";
  }

  panel.innerHTML = html;
}

/* ---------------- RULES ---------------- */
function updateRuleGuide(type){

  const panel = document.getElementById("ruleGuide");
  if(!panel || !rules[type]) return;

  let html = `<div class='ruleTitle'>${type} RULES</div>`;

  rules[type].forEach(r=>{
    html += `<div class='ruleItem'>✔ ${r}</div>`;
  });

  panel.innerHTML = html;
}

/* ---------------- SOLUTIONS ---------------- */
function updateSolutionPanel(){

  const panel = document.getElementById("solutionPanel");
  if(!panel) return;

  let html = "";

  for(let k in state){

    let v = state[k];
    let tier = v<3?0:v<6?1:v<10?2:3;

    html += `<div class='ruleTitle'>${k} → ${solutions[k][tier]}</div>`;
    html += `<div class='ruleItem'>Action Tier Active</div><br>`;
  }

  panel.innerHTML = html;
}

/* ---------------- ENGINE ---------------- */
function runScenario(type){

  state[type] = (state[type]||0)+2;

  if(type==="FX"){
    state.DC++;
    state.CYB++;
  }

  log.push(`${new Date().toISOString()} | SCENARIO | ${type}`);

  updateRuleGuide(type);
  updateSolutionPanel();
  updateAutoSuggest();
  updateActionPanel();

  render();
}

/* ---------------- RESET ---------------- */
function resetSystem(){

  state = { FX:0, DC:0, CYB:0, INF:0 };
  log = [];

  log.push(`${new Date().toISOString()} | SYSTEM RESET`);

  updateRuleGuide("FX");
  updateSolutionPanel();
  updateAutoSuggest();
  updateActionPanel();

  render();
}

/* ---------------- GRAPH ---------------- */
function drawGraph(){

  const c = document.getElementById("riskGraph");
  const ctx = c.getContext("2d");

  ctx.clearRect(0,0,c.width,c.height);

  const keys = Object.keys(state);
  const vals = Object.values(state);

  vals.forEach((v,i)=>{

    let x = i*120+40;
    let h = Math.min(180,v*12);

    ctx.fillStyle =
      v>8?"#ff4d4d":
      v>4?"#ffcc00":
      "#4dff88";

    ctx.fillRect(x,200-h,40,h);

    ctx.fillStyle="#cfe8ff";
    ctx.fillText(keys[i],x,210);
  });
}

/* ---------------- RENDER ---------------- */
function render(){

  document.getElementById("stateBox").innerText =
    JSON.stringify(state,null,2);

  document.getElementById("log").innerText =
    log.slice(-20).join("\n");

  drawGraph();
  updateAutoSuggest();
  updateSolutionPanel();
  updateActionPanel();
}

/* INIT */
render();

</script>

</body>
</html>
