/* =====================================
   MAIN INJECTION ENGINE
===================================== */


function inject(type){

"</b><br>"+
scenario.desc;


runCascade(type);


evaluateRisk();


goldenRuleCheck();


addAudit(
"INJECT → "+type
);


render();

/* =====================================
   CASCADE ENGINE
===================================== */


function runCascade(type){


if(type==="FX"){

STATE.DC+=3;
STATE.CYB+=1;

logEvent("CASCADE FX → DC");

}


if(type==="DC"){

STATE.INF+=3;

logEvent("CASCADE DC → INF");

}


if(type==="CYB"){

STATE.INF+=2;

logEvent("CASCADE CYB → INF");

}


if(type==="INF"){

STATE.FX+=2;

logEvent("CASCADE INF → FX");

}


}



/* =====================================
   RISK ENGINE
===================================== */


function riskScore(){

return(

STATE.FX+
STATE.DC+
STATE.CYB+
STATE.INF+
STATE.EN

)/5;

}




function evaluateRisk(){


let risk=riskScore();

let level="LOW";


if(risk>=75){

level="CRITICAL";

}

else if(risk>=50){

level="HIGH";

}

else if(risk>=30){

level="MEDIUM";

}



document.getElementById("risk").innerHTML=

"Risk: "+level;


document.getElementById("statusBar").innerHTML=

"SYSTEM STATUS: "+level;


}

===================================== */

]


};



function goldenRuleCheck(){


if(riskScore()>=50){


logEvent(
"GOLDEN RULE ACTIVE → CONTAINMENT PRIORITY"
);


return false;


}


logEvent(
"GOLDEN RULE CHECK → NORMAL"
);


return true;


}



/* =====================================
   LOG ENGINE
===================================== */


function logEvent(message){


let log=document.getElementById("log");


log.innerHTML+="<br>"+message;


log.scrollTop=log.scrollHeight;


}



/* =====================================
   AUDIT ENGINE
===================================== */

time:new Date().toLocaleTimeString(),

event:message

});


document.getElementById("audit").innerHTML=

AUDIT.map(a=>

a.time+" | "+a.event

).join("<br>");

}
