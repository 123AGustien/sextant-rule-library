<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SPD v11.0 // DIGITAL TWIN CORE</title>

<style>
body {
  margin: 0;
  background: #05070b;
  color: #cfe8ff;
  font-family: Arial, sans-serif;
  overflow: hidden;
}

.header {
  padding: 12px;
  background: #0b1220;
  font-size: 14px;
}

.panel {
  display: flex;
  justify-content: space-around;
  padding: 20px;
}

.card {
  background: #0e1a2b;
  padding: 20px;
  width: 20%;
  text-align: center;
  border-radius: 8px;
}

.value {
  font-size: 26px;
  margin-top: 10px;
}

.buttons {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin: 10px;
  flex-wrap: wrap;
}

button {
  padding: 8px 12px;
  background: #1f3b5c;
  color: white;
  border: none;
  cursor: pointer;
}

#statusBar {
  text-align: center;
  padding: 8px;
  font-size: 13px;
  background: #0a0f18;
}

#audit {
  position: absolute;
  bottom: 0;
  height: 140px;
  width: 100%;
  background: #0a0f18;
  overflow-y: auto;
  font-size: 12px;
  padding: 10px;
}
</style>
</head>

<body>

<div class="header">
🛰 SPD v11.0 // SCENARIO DIGITAL TWIN CORE
</div>

<div id="statusBar">STATUS: READY</div>

<div class="panel">
  <div class="card">FX<div class="value" id="FX">0</div></div>
  <div class="card">DC<div class="value" id="DC">0</div></div>
  <div class="card">CYB<div class="value" id="CYB">0</div></div>
  <div class="card">INF<div class="value" id="INF">0</div></div>
</div>

<div class="buttons">
  <button onclick="runScenario('BOND_CRISIS')">BOND CRISIS</button>
  <button onclick="runScenario('CYBER_WAR')">CYBER WAR</button>
  <button onclick="runScenario('GRID_FAILURE')">GRID FAILURE</button>
  <button onclick="inject('FX')">FX STRESS</button>
  <button onclick="reset()">RESET</button>
</div>

<div id="audit"></div>

<script>

/* =========================
   DIGITAL TWIN STATE
========================= */

const NODES = {
  FX: { value: 0, sens: 0.7 },
  DC: { value: 0, sens: 0.9 },
  CYB:{ value: 0, sens: 0.8 },
  INF:{ value: 0, sens: 0.85 }
};

/* Weighted edges */
const EDGES = [
  { from:"FX", to:"DC", w:0.8 },
  { from:"DC", to:"CYB", w:0.7 },
  { from:"CYB", to:"INF", w:0.6 },
  { from:"INF", to:"FX", w:0.5 }
];

/* Scenarios */
const SCENARIOS = {
  BOND_CRISIS: { FX: 35, DC: 10, CYB: 5 },
  CYBER_WAR:   { CYB: 40, DC: 25, INF: 10 },
  GRID_FAILURE: { INF: 50, DC: 20, FX: 15 }
};

let log = [];
let events = [];

/* =========================
   AUDIT
========================= */

function audit(type, data){
  log.push({
    time: new Date().toLocaleTimeString(),
    type,
    data
  });
}

/* =========================
   SCENARIO ENGINE
========================= */

function runScenario(name){
  const s = SCENARIOS[name];
  if(!s) return;

  for(let k in s){
    NODES[k].value += s[k];
  }

  audit("SCENARIO", {name});
  render();
}

/* =========================
   DIRECT INJECTION
========================= */

function inject(node){
  NODES[node].value += 10;
  audit("INJECT", {node});
  render();
}

/* =========================
   CASCADE ENGINE (PROBABILISTIC)
========================= */

function cascade(){
  EDGES.forEach(e => {
    const from = NODES[e.from];
    const to = NODES[e.to];

    const chance =
      from.value * e.w * to.sens / 100;

    if(Math.random() < chance){
      to.value += 5;
      audit("CASCADE", {from:e.from,to:e.to});
    }
  });
}

/* =========================
   TIME ENGINE
========================= */

function tick(){
  for(let k in NODES){
    NODES[k].value *= 0.97; // nonlinear decay
  }

  cascade();
  render();
}

setInterval(tick, 1000);

/* =========================
   RESET
========================= */

function reset(){
  for(let k in NODES){
    NODES[k].value = 0;
  }
  audit("RESET",{});
  render();
}

/* =========================
   RENDER
========================= */

function render(){
  FX.innerText  = NODES.FX.value.toFixed(1);
  DC.innerText  = NODES.DC.value.toFixed(1);
  CYB.innerText = NODES.CYB.value.toFixed(1);
  INF.innerText = NODES.INF.value.toFixed(1);

  auditView();
}

/* =========================
   AUDIT VIEW
========================= */

function auditView(){
  audit.innerHTML = log.slice(-10).map(e =>
    `[${e.time}] ${e.type}`
  ).join("<br>");
}

/* INIT */
render();

</script>

</body>
</html>
