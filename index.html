<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SPD v11.1 // PROBABILISTIC SIMULATOR CORE</title>

<style>
body {
  margin: 0;
  background: #05070b;
  color: #cfe8ff;
  font-family: Arial, sans-serif;
}

.header {
  padding: 12px;
  background: #0b1220;
}

.panel {
  display: flex;
  justify-content: space-around;
  padding: 20px;
}

.card {
  background: #0e1a2b;
  padding: 20px;
  width: 20%;
  text-align: center;
}

.value {
  font-size: 26px;
}

button {
  padding: 8px 12px;
  background: #1f3b5c;
  color: white;
  border: none;
  cursor: pointer;
  margin: 3px;
}

#audit {
  position: absolute;
  bottom: 0;
  width: 100%;
  height: 140px;
  overflow-y: auto;
  background: #0a0f18;
  font-size: 12px;
  padding: 10px;
}

.status {
  text-align: center;
  padding: 8px;
  font-size: 13px;
  background: #0a0f18;
}
</style>
</head>

<body>

<div class="header">
🛰 SPD v11.1 // PROBABILISTIC SIMULATOR CORE
</div>

<div class="status" id="status">STATUS: READY</div>

<div class="panel">
  <div class="card">FX<div id="FX" class="value">0</div></div>
  <div class="card">DC<div id="DC" class="value">0</div></div>
  <div class="card">CYB<div id="CYB" class="value">0</div></div>
  <div class="card">INF<div id="INF" class="value">0</div></div>
</div>

<div style="text-align:center;">
  <button onclick="enqueue('FX')">FX STRESS</button>
  <button onclick="enqueue('DC')">DC LOAD</button>
  <button onclick="enqueue('CYB')">CYBER EVENT</button>
  <button onclick="enqueue('INF')">INFRA STRAIN</button>
  <button onclick="reset()">RESET</button>
</div>

<div id="audit"></div>

<script>

/* =========================
   STATE MODEL (WITH SENSITIVITY)
========================= */

const state = {
  FX:  { value:0, sens:0.7 },
  DC:  { value:0, sens:0.9 },
  CYB: { value:0, sens:0.8 },
  INF: { value:0, sens:0.85 }
};

const links = {
  FX:"DC",
  DC:"CYB",
  CYB:"INF",
  INF:"FX"
};

const queue = [];
let log = [];

const threshold = 30;

/* =========================
   INPUT LAYER
========================= */

function enqueue(type){
  queue.push({ type, value: 6 });
  audit("ENQUEUE", {type});
}

/* =========================
   PROCESS QUEUE
========================= */

function processQueue(){
  while(queue.length > 0){
    const e = queue.shift();
    state[e.type].value += e.value;
  }
}

/* =========================
   PROBABILISTIC CASCADE ENGINE
========================= */

function cascade(){

  for(let from in state){

    const fromNode = state[from];
    if(fromNode.value < threshold) continue;

    const to = links[from];

    const toNode = state[to];

    // 🔥 probability formula (core upgrade)
    const probability =
      (fromNode.value / 100) *
      fromNode.sens *
      toNode.sens;

    const roll = Math.random();

    if(roll < probability){

      const impact = 5 + Math.random() * 5;
      toNode.value += impact;

      audit("CASCADE", {
        from,
        to,
        roll: roll.toFixed(3),
        p: probability.toFixed(3),
        impact: impact.toFixed(1)
      });
    }
  }
}

/* =========================
   TIME ENGINE (NONLINEAR DECAY)
========================= */

function tick(){

  processQueue();
  cascade();

  for(let k in state){
    state[k].value *= 0.97; // soft decay
    state[k].value = Math.max(0, state[k].value);
  }

  render();
}

setInterval(tick, 1000);

/* =========================
   RESET
========================= */

function reset(){
  for(let k in state){
    state[k].value = 0;
  }
  queue.length = 0;
  audit("RESET",{});
}

/* =========================
   AUDIT
========================= */

function audit(type, data){
  log.push({
    time: new Date().toLocaleTimeString(),
    type,
    data
  });
}

/* =========================
   STABILITY ENGINE
========================= */

function stability(){

  let avg =
    (state.FX.value +
     state.DC.value +
     state.CYB.value +
     state.INF.value) / 4;

  let vol =
    Math.abs(state.FX.value - state.DC.value) +
    Math.abs(state.CYB.value - state.INF.value);

  return Math.max(0, 100 - avg*1.5 - vol*0.5);
}

/* =========================
   RENDER ENGINE
========================= */

function render(){

  FX.innerText  = state.FX.value.toFixed(1);
  DC.innerText  = state.DC.value.toFixed(1);
  CYB.innerText = state.CYB.value.toFixed(1);
  INF.innerText = state.INF.value.toFixed(1);

  let s = stability();

  status.innerText =
    s > 70 ? "STATUS: STABLE" :
    s > 40 ? "STATUS: UNSTABLE" :
    s > 20 ? "STATUS: CRITICAL" :
             "STATUS: BLACKOUT";

  audit.innerHTML = log.slice(-12).map(e =>
    `[${e.time}] ${e.type}`
  ).join("<br>");
}

/* INIT */
render();

</script>

</body>
</html>
