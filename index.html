<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SPD v12 // COCKPIT DASHBOARD CORE</title>

<style>
body {
  margin:0;
  background:#05070b;
  color:#cfe8ff;
  font-family:Arial;
}

.header {
  padding:10px;
  background:#0b1220;
  text-align:center;
}

#statusBar {
  text-align:center;
  padding:6px;
  background:#0a0f18;
}

.panel {
  display:flex;
  justify-content:space-around;
  padding:10px;
}

.card {
  background:#0e1a2b;
  width:18%;
  padding:12px;
  text-align:center;
}

.value {
  font-size:24px;
}

#alerts {
  position:absolute;
  right:10px;
  top:60px;
  width:260px;
  height:260px;
  background:#0a0f18;
  font-size:11px;
  overflow:auto;
  padding:10px;
}

#systemView {
  position:absolute;
  left:10px;
  top:60px;
  width:260px;
  height:260px;
  background:#0a0f18;
  font-size:12px;
  padding:10px;
}
</style>
</head>

<body>

<div class="header">🛰 SPD COCKPIT DASHBOARD v12</div>

<div id="statusBar">STATUS: INIT</div>

<div class="panel">
  <div class="card">FX<div id="FX" class="value">0</div></div>
  <div class="card">DC<div id="DC" class="value">0</div></div>
  <div class="card">CYB<div id="CYB" class="value">0</div></div>
  <div class="card">INF<div id="INF" class="value">0</div></div>
  <div class="card">ENG<div id="ENG" class="value">0</div></div>
</div>

<div id="systemView"></div>
<div id="alerts"></div>

<div style="text-align:center;">
  <button onclick="inject('FX')">FX +</button>
  <button onclick="inject('DC')">DC +</button>
  <button onclick="inject('CYB')">CYB +</button>
  <button onclick="inject('INF')">INF +</button>
  <button onclick="inject('ENG')">ENG +</button>
  <button onclick="reset()">RESET</button>
</div>

<script>

/* ---------------- STATE ---------------- */
const domains = {
  FX:{risk:0,mode:"OK"},
  DC:{risk:0,mode:"OK"},
  CYB:{risk:0,mode:"OK"},
  INF:{risk:0,mode:"OK"},
  ENG:{risk:0,mode:"OK"}
};

let log = [];

/* ---------------- ENGINE ---------------- */
const COCKPIT_DASHBOARD = {

  render(domains) {

    const summary = this.summarize(domains);
    const globalRisk = this.globalRisk(summary);

    return {
      globalRisk,
      status: this.getStatus(globalRisk),
      tiles: {
        FX: this.tile(domains.FX),
        DC: this.tile(domains.DC),
        CYB: this.tile(domains.CYB),
        INF: this.tile(domains.INF),
        ENG: this.tile(domains.ENG)
      },
      alerts: this.getAlerts(domains),
      systemView: this.systemView(globalRisk)
    };
  },

  summarize(domains) {
    return Object.keys(domains).reduce((a,k)=>{
      a[k]=domains[k].risk;
      return a;
    },{});
  },

  globalRisk(summary) {
    return Object.values(summary).reduce((a,b)=>a+b,0);
  },

  getStatus(risk) {
    if (risk >= 18) return "CRITICAL";
    if (risk >= 10) return "WARNING";
    return "STABLE";
  },

  tile(d) {
    return {
      risk:d.risk,
      mode:d.mode,
      alert:d.risk>=7
    };
  },

  getAlerts(domains){
    const a=[];
    for(const k in domains){
      if(domains[k].risk>=7) a.push(k+"_CRITICAL");
    }
    return a;
  },

  systemView(risk){
    return {
      label:
        risk>=18?"SYSTEM COLLAPSE RISK":
        risk>=10?"SYSTEM UNDER STRESS":
        "SYSTEM STABLE",
      risk
    };
  }
};

/* ---------------- ACTIONS ---------------- */
function inject(k){
  domains[k].risk += 2;
  log.push(k+" +2");
}

function reset(){
  for(const k in domains) domains[k].risk = 0;
  log=[];
}

/* ---------------- RENDER ---------------- */
function renderUI(){

  const view = COCKPIT_DASHBOARD.render(domains);

  FX.innerText = domains.FX.risk;
  DC.innerText = domains.DC.risk;
  CYB.innerText = domains.CYB.risk;
  INF.innerText = domains.INF.risk;
  ENG.innerText = domains.ENG.risk;

  statusBar.innerText = "STATUS: " + view.status;

  systemView.innerHTML =
    "<b>"+view.systemView.label+"</b><br><br>" +
    "GLOBAL RISK: " + view.globalRisk;

  alerts.innerHTML =
    "<b>ALERTS</b><br>" + view.alerts.join("<br>") +
    "<br><br><b>LOG</b><br>" + log.slice(-10).join("<br>");
}

/* ---------------- LOOP ---------------- */
setInterval(renderUI, 800);
renderUI();

</script>

</body>
</html>
