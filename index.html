<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SPD v11.7 // OJK PRODUCTION DIGITAL TWIN</title>

<style>
body {
  margin: 0;
  background: #05070b;
  color: #cfe8ff;
  font-family: Arial, sans-serif;
  overflow: hidden;
}

.header {
  padding: 10px;
  background: #0b1220;
  font-size: 14px;
}

#statusBar {
  text-align: center;
  padding: 6px;
  background: #0a0f18;
  font-size: 13px;
}

.panel {
  display: flex;
  justify-content: space-around;
  padding: 10px;
}

.card {
  background: #0e1a2b;
  width: 22%;
  padding: 12px;
  text-align: center;
  border-radius: 6px;
}

.value {
  font-size: 26px;
}

#graph {
  position: relative;
  height: 240px;
  margin: 10px;
}

.node {
  position: absolute;
  width: 52px;
  height: 52px;
  border-radius: 50%;
  background: #1f3b5c;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  transition: 0.25s;
  cursor: pointer;
}

.buttons {
  text-align: center;
  margin: 8px;
}

button {
  padding: 7px 10px;
  margin: 3px;
  background: #1f3b5c;
  color: white;
  border: none;
  cursor: pointer;
}

#explain {
  position: absolute;
  right: 10px;
  top: 60px;
  width: 280px;
  height: 260px;
  background: #0a0f18;
  padding: 10px;
  font-size: 11px;
  overflow-y: auto;
  border-left: 2px solid #1f3b5c;
}
</style>
</head>

<body>

<div class="header">
🛰 SPD v11.7 // OJK PRODUCTION DIGITAL TWIN SIMULATOR
</div>

<div id="statusBar">STATUS: READY</div>

<div class="panel">
  <div class="card">FX<div id="FX" class="value">0.0</div></div>
  <div class="card">DC<div id="DC" class="value">0.0</div></div>
  <div class="card">CYB<div id="CYB" class="value">0.0</div></div>
  <div class="card">INF<div id="INF" class="value">0.0</div></div>
</div>

<div id="graph">
  <div class="node" id="nFX" onclick="trace('FX')">FX</div>
  <div class="node" id="nDC" onclick="trace('DC')">DC</div>
  <div class="node" id="nCYB" onclick="trace('CYB')">CYB</div>
  <div class="node" id="nINF" onclick="trace('INF')">INF</div>
</div>

<div class="buttons">
  <button onclick="inject('FX')">FX STRESS</button>
  <button onclick="inject('DC')">DC LOAD</button>
  <button onclick="inject('CYB')">CYBER EVENT</button>
  <button onclick="inject('INF')">INFRA STRAIN</button>
  <button onclick="reset()">RESET</button>
</div>

<div id="explain">Explain: idle</div>

<script>

/* =========================
   STATE CORE
========================= */

const state = {
  FX: { v: 0, s: 0.7, x: 80, y: 80 },
  DC: { v: 0, s: 0.9, x: 220, y: 40 },
  CYB:{ v: 0, s: 0.8, x: 360, y: 80 },
  INF:{ v: 0, s: 0.85, x: 220, y: 140 }
};

const LINKS = [
  ["FX","DC"],
  ["DC","CYB"],
  ["CYB","INF"],
  ["INF","FX"]
];

/* =========================
   MEMORY SYSTEMS
========================= */

let log = [];
let explanationLog = [];

/* =========================
   ENGINE
========================= */

function inject(node){
  state[node].v += 10;
  logEvent("INJECT", node);
}

function cascade(){

  LINKS.forEach(([a,b]) => {

    const A = state[a];
    const B = state[b];

    const p = (A.v * A.s * B.s) / 120;

    if(Math.random() < p){

      const impact = 3 + Math.random() * 4;
      B.v += impact;

      logEvent("CASCADE", {
        from: a,
        to: b,
        p: p.toFixed(3),
        impact: impact.toFixed(2)
      });

      explain(`CASCADE: ${a} → ${b} | p=${p.toFixed(3)} | +${impact.toFixed(1)}`);
    }
  });
}

/* =========================
   DECAY ENGINE
========================= */

function decay(){
  for(let k in state){
    state[k].v *= 0.97;
    state[k].v = Math.max(0, state[k].v);
  }
}

/* =========================
   TIME ENGINE
========================= */

function tick(){
  cascade();
  decay();
  render();
}

setInterval(tick, 1000);

/* =========================
   TRACE ENGINE
========================= */

function trace(node){

  const events = log.filter(e =>
    (e.data?.from === node || e.data?.to === node || e.data === node)
  ).slice(-10);

  explain(`🔍 TRACE NODE: ${node}`);

  events.forEach(e => {
    explain(
      `${e.type} | ${JSON.stringify(e.data)}`
    );
  });
}

/* =========================
   LOG ENGINE
========================= */

function logEvent(type, data){
  log.push({
    time: new Date(),
    type,
    data
  });
}

/* =========================
   EXPLAIN ENGINE (FIXED)
========================= */

function explain(msg){

  explanationLog.push({
    time: new Date(),
    msg
  });

  const box = document.getElementById("explain");

  box.innerHTML =
    "🧠 EXPLANATION LAYER<br><br>" +
    explanationLog.slice(-12).map(e =>
      `[${e.time.toLocaleTimeString()}] ${e.msg}`
    ).join("<br>");
}

/* =========================
   RESET
========================= */

function reset(){
  for(let k in state){
    state[k].v = 0;
  }
  logEvent("RESET", {});
  explain("SYSTEM RESET → baseline restored");
}

/* =========================
   RENDER ENGINE
========================= */

function render(){

  FX.innerText = state.FX.v.toFixed(1);
  DC.innerText = state.DC.v.toFixed(1);
  CYB.innerText = state.CYB.v.toFixed(1);
  INF.innerText = state.INF.v.toFixed(1);

  document.getElementById("nFX").style.left = state.FX.x + "px";
  document.getElementById("nFX").style.top  = state.FX.y + "px";

  document.getElementById("nDC").style.left = state.DC.x + "px";
  document.getElementById("nDC").style.top  = state.DC.y + "px";

  document.getElementById("nCYB").style.left = state.CYB.x + "px";
  document.getElementById("nCYB").style.top  = state.CYB.y + "px";

  document.getElementById("nINF").style.left = state.INF.x + "px";
  document.getElementById("nINF").style.top  = state.INF.y + "px";

  for(let k in state){
    const el = document.getElementById("n"+k);

    el.style.transform = `scale(${1 + state[k].v/50})`;

    el.style.background =
      state[k].v > 40 ? "#ff3b3b" :
      state[k].v > 20 ? "#ffb020" :
      "#1f3b5c";
  }
}

/* INIT */
render();

</script>

</body>
</html>
