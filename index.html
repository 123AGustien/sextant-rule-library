<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SPD v12 // FULL AUTONOMOUS COCKPIT</title>

<style>
body {
  margin: 0;
  background: radial-gradient(circle at center, #070b12, #020409);
  color: #cfe8ff;
  font-family: Arial, sans-serif;
}

.header {
  padding: 12px;
  background: #0c1624;
  border-bottom: 1px solid #223447;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 13px;
}

.grid {
  display: grid;
  grid-template-columns: 1.2fr 1fr;
  height: calc(100vh - 50px);
}

.panel {
  padding: 12px;
  border-right: 1px solid #1b2a3a;
  overflow: auto;
}

.right { background: #060a10; }

button {
  background: #132235;
  color: #cfe8ff;
  border: 1px solid #2b425a;
  padding: 8px;
  margin: 4px;
  cursor: pointer;
}

button:hover { background: #1b3550; }

.badge {
  padding: 4px 8px;
  background: #0f2a1f;
  border: 1px solid #1f5a3a;
  color: #6dffb3;
  font-size: 12px;
}

.stateBox, .log {
  background: #05070b;
  padding: 10px;
  border: 1px solid #1b2a3a;
  font-size: 12px;
}

canvas {
  background: #05070b;
  border: 1px solid #1b2a3a;
  margin-top: 10px;
}

.ruleTitle {
  color:#6dffb3;
  font-weight:bold;
  margin-bottom:6px;
}

.ruleItem { margin: 3px 0; }
</style>
</head>

<body>

<div class="header">
🛰 SPD v12 // AUTONOMOUS COCKPIT
<span id="status" class="badge">SYSTEM ONLINE</span>
</div>

<div class="grid">

<!-- LEFT -->
<div class="panel">

<h3>⚙ Scenario Engine</h3>

<button onclick="runScenario('FX')">FX SHOCK</button>
<button onclick="runScenario('DC')">DATA CENTER</button>
<button onclick="runScenario('CYB')">CYBER EVENT</button>
<button onclick="runScenario('INF')">INFRA FAILURE</button>

<h3>📊 State</h3>
<pre id="stateBox" class="stateBox"></pre>

<h3>📘 Rules</h3>
<div id="ruleGuide" class="stateBox"></div>

<h3>🧠 Solutions</h3>
<div id="solutionPanel" class="stateBox"></div>

<h3>🚨 AUTO SUGGEST</h3>
<div id="autoSuggestPanel" class="stateBox"></div>

<h3>📊 Graph</h3>
<canvas id="riskGraph" width="520" height="220"></canvas>

</div>

<!-- RIGHT -->
<div class="panel right">
<h3>📡 Audit</h3>
<div id="log" class="log"></div>
</div>

</div>

<script>

/* ---------------- STATE ---------------- */
let state = { FX:0, DC:0, CYB:0, INF:0 };
let log = [];

/* ---------------- RULES ---------------- */
const rules = {
FX:["Volatility","Outflow","Liquidity","Confidence"],
DC:["Load","Cooling","Power","Redundancy"],
CYB:["Alert","Compromise","Attack","Containment"],
INF:["Failure","Services","Dependency","Restore"]
};

/* ---------------- SOLUTIONS ---------------- */
const solutions = {
FX:[["STABLE","Monitor FX"],["WATCH","Reduce exposure"],["DEGRADED","Hedge FX"],["CRITICAL","Emergency liquidity"]],
DC:[["STABLE","Normal load"],["WATCH","Balance load"],["DEGRADED","Reduce services"],["CRITICAL","Failover"]],
CYB:[["STABLE","Monitor logs"],["WATCH","Increase security"],["DEGRADED","Isolate systems"],["CRITICAL","Disconnect"]],
INF:[["STABLE","Normal ops"],["WATCH","Check systems"],["DEGRADED","Reroute"],["CRITICAL","Emergency restore"]]
};

/* ---------------- AUTO SUGGEST ENGINE ---------------- */
function updateAutoSuggest() {

  const risks = Object.entries(state)
    .sort((a,b)=>b[1]-a[1]);

  const top = risks[0];

  const suggestions = [];

  if (top[1] > 6) {
    suggestions.push(`PRIORITY: Stabilise ${top[0]}`);
  }

  if (state.CYB > 5) suggestions.push("Isolate cyber systems");
  if (state.FX > 5) suggestions.push("Inject liquidity buffer");
  if (state.DC > 5) suggestions.push("Reduce data centre load");
  if (state.INF > 5) suggestions.push("Activate infrastructure fallback");

  let html = "";

  if (suggestions.length === 0) {
    html = "🟢 System stable — no action required";
  } else {
    suggestions.forEach(s => {
      html += `<div class='ruleItem'>⚡ ${s}</div>`;
    });
  }

  document.getElementById("autoSuggestPanel").innerHTML = html;
}

/* ---------------- RULE PANEL ---------------- */
function updateRuleGuide(type){
  let html = `<div class='ruleTitle'>${type} RULES</div>`;
  rules[type].forEach(r => html += `<div class='ruleItem'>✔ ${r}</div>`);
  document.getElementById("ruleGuide").innerHTML = html;
}

/* ---------------- SOLUTION PANEL ---------------- */
function updateSolutionPanel(){

  let html = "";

  for (let k in state) {
    let v = state[k];
    let tier = v < 3 ? 0 : v < 6 ? 1 : v < 10 ? 2 : 3;

    const s = solutions[k][tier];

    html += `<div class='ruleTitle'>${k} → ${s[0]}</div>`;
    html += `<div class='ruleItem'>${s[1]}</div><br>`;
  }

  document.getElementById("solutionPanel").innerHTML = html;
}

/* ---------------- ENGINE ---------------- */
function runScenario(type){

  state[type] += 2;

  if(type==="FX"){
    state.DC += 1;
    state.CYB += 1;
  }

  log.push(`${new Date().toISOString()} | ${type}`);

  updateRuleGuide(type);
  updateSolutionPanel();
  updateAutoSuggest();

  render();
}

/* ---------------- GRAPH ---------------- */
function drawGraph(){

  const c = document.getElementById("riskGraph");
  const ctx = c.getContext("2d");

  ctx.clearRect(0,0,c.width,c.height);

  const keys = Object.keys(state);
  const vals = Object.values(state);

  vals.forEach((v,i)=>{
    let x = i*120+40;
    let h = Math.min(180,v*12);

    ctx.fillStyle = v>8?"#ff4d4d":v>4?"#ffcc00":"#4dff88";
    ctx.fillRect(x,200-h,40,h);

    ctx.fillStyle="#cfe8ff";
    ctx.fillText(keys[i],x,210);
  });
}

/* ---------------- RENDER ---------------- */
function render(){

  document.getElementById("stateBox").innerText =
    JSON.stringify(state,null,2);

  document.getElementById("log").innerText =
    log.slice(-20).join("\n");

  drawGraph();
  updateAutoSuggest();
}

/* INIT */
render();

</script>

</body>
</html>
