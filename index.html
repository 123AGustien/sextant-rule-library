<script>

function draw() {
  const c = document.getElementById("g");
  if (!c) return;

  const x = c.getContext("2d");

  x.clearRect(0, 0, c.width, c.height);

  const k = Object.keys(s);
  const v = Object.values(s);
  const m = Math.max(...v, 5);

  k.forEach((a, i) => {
    let h = (v[i] / m) * 200;

    x.fillStyle = "#00ffd5";
    x.fillRect(50 + i * 80, 220 - h, 30, h);

    x.fillStyle = "#ffffff";
    x.fillText(a, 50 + i * 80, 240);
  });
}

/* SAFE INIT HOOK */
document.addEventListener("DOMContentLoaded", function () {
  draw();
});
</script>
