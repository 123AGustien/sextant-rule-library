<!DOCTYPE html>
<html>
<head>
  <title>Sextant Protocol Simulation Console v10</title>

  <style>
    body {
      font-family: Arial;
      background: #0b0f1a;
      color: #ffffff;
      margin: 0;
      padding: 20px;
    }

    h1 { margin-bottom: 20px; }

    .panel {
      border: 1px solid #2a2f3a;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 8px;
      background: #111827;
    }

    button {
      padding: 10px;
      margin: 5px;
      cursor: pointer;
      background: #1f2937;
      color: white;
      border: 1px solid #374151;
      border-radius: 6px;
    }

    button:hover {
      background: #374151;
    }

    pre {
      background: #0a0f1f;
      padding: 10px;
      overflow-x: auto;
    }

    canvas {
      background: #0a0f1f;
      border: 1px solid #2a2f3a;
      display: block;
      margin-top: 10px;
    }

    .green { color: #00ff88; }
    .yellow { color: #ffd000; }
    .orange { color: #ff8800; }
    .red { color: #ff3b3b; }
  </style>
</head>

<body>

<h1>🧠 Sextant Protocol Simulation Console (v10.0)</h1>

<!-- ================= SCENARIO ENGINE ================= -->
<div class="panel">
  <h2>Scenario Engine (FIN / DC / CYB / INF)</h2>

  <button onclick="runScenario('FIN-001')">FX Stress</button>
  <button onclick="runScenario('DC-001')">Cooling Failure</button>
  <button onclick="runScenario('CYB-001')">Ransomware</button>
  <button onclick="runScenario('INF-001')">Network Outage</button>
</div>

<!-- ================= LIVE EVENTS ================= -->
<div class="panel">
  <h2>Live Event Ingestion (Step 20)</h2>

  <button onclick="runScenario('FIN-001')">FX Spike</button>
  <button onclick="runScenario('DC-001')">Bond Stress</button>
  <button onclick="runScenario('CYB-001')">Cyber Attack</button>
  <button onclick="runScenario('INF-001')">Infra Failure</button>
</div>

<!-- ================= SYSTEM OUTPUT ================= -->
<div class="panel">
  <h2>System Output</h2>
  <div id="output">Waiting for simulation...</div>
</div>

<!-- ================= CASCADE GRAPH ================= -->
<div class="panel">
  <h2>System Cascade Graph</h2>
  <canvas id="graph" width="500" height="500"></canvas>
</div>

<!-- ================= AUDIT PANEL ================= -->
<div class="panel">
  <h2>Audit Trail (Step 18 Explainability)</h2>

  <button onclick="showAudit()">Show Audit Log</button>
  <button onclick="clearAudit()">Clear Audit Log</button>

  <pre id="audit"></pre>
</div>

<!-- ================= SCRIPTS ================= -->
<script src="engine.js"></script>
<script src="cascade-graph.js"></script>

<script>
/* =========================
   AUDIT SAFE WRAPPERS
========================= */

function showAudit() {
  if (typeof auditLog === "undefined") {
    document.getElementById("audit").textContent = "No audit log found";
    return;
  }

  document.getElementById("audit").textContent =
    JSON.stringify(auditLog, null, 2);
}

function clearAudit() {
  if (typeof auditLog !== "undefined") {
    auditLog.length = 0;
  }

  document.getElementById("audit").textContent = "Audit cleared.";
}

/* =========================
   SAFE INIT HOOK (IMPORTANT)
========================= */

window.onload = function () {

  if (typeof initGraph === "function") {
    initGraph("graph");
  }

  if (typeof initSimulation === "function") {
    initSimulation();
  }
};
</script>

</body>
</html>
