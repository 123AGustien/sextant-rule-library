<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SPD v12 // CLEAN AUTONOMOUS COCKPIT</title>

<style>
body{
margin:0;
background:#05070b;
color:#cfe8ff;
font-family:Arial;
}

.header{
padding:10px;
background:#0b1220;
text-align:center;
font-weight:bold;
}

#statusBar{
text-align:center;
padding:6px;
background:#0a0f18;
}

.panel{
display:flex;
justify-content:space-around;
padding:10px;
}

.card{
background:#0e1a2b;
width:22%;
padding:10px;
border-radius:6px;
text-align:center;
}

.value{font-size:24px;}

button{
margin:3px;
padding:8px;
background:#1f3b5c;
color:white;
border:none;
cursor:pointer;
}

#scenarioPanel{
padding:10px;
margin:10px;
background:#0a0f18;
font-size:12px;
}

#log{
position:absolute;
right:10px;
top:180px;
width:340px;
height:340px;
overflow:auto;
background:#0a0f18;
padding:10px;
font-size:11px;
border-left:2px solid #1f3b5c;
}
</style>
</head>

<body>

<div class="header">🛰 SPD v12 // CLEAN AUTONOMOUS COCKPIT</div>

<div id="statusBar">STATUS: STABLE</div>

<div class="panel">
<div class="card">FX <div id="FX" class="value">0</div></div>
<div class="card">DC <div id="DC" class="value">0</div></div>
<div class="card">CYB <div id="CYB" class="value">0</div></div>
<div class="card">INF <div id="INF" class="value">0</div></div>
</div>

<!-- ACTION PANEL -->
<div style="text-align:center">
<button onclick="inject('FX')">FX STRESS</button>
<button onclick="inject('DC')">DC LOAD</button>
<button onclick="inject('CYB')">CYBER EVENT</button>
<button onclick="inject('INF')">INFRA STRAIN</button>
<button onclick="resetAll()">RESET</button>
</div>

<!-- SCENARIO PANEL -->
<div id="scenarioPanel">
SCENARIO PANEL: READY<br>
<div id="scenarioText">No active scenario</div>
</div>

<div id="log"></div>

<script>

/* STATE */
const state = {
FX:0,
DC:0,
CYB:0,
INF:0
};

/* RULES */
const rules = {
FX:1.0,
DC:0.9,
CYB:1.2,
INF:1.1
};

/* SCENARIOS (MEANING LAYER FIXED) */
const scenarioMap = {
FX:{
name:"Financial Stress Injection",
desc:"Market volatility + liquidity disruption simulated",
risk:"MEDIUM",
effect:"Drives DC instability and increases cyber sensitivity"
},
DC:{
name:"Data Center Load Spike",
desc:"Compute saturation and thermal pressure event",
risk:"MEDIUM-HIGH",
effect:"Triggers INF degradation cascade"
},
CYB:{
name:"Cyber Event Triggered",
desc:"Security anomaly injected into system layer",
risk:"HIGH",
effect:"Weakens INF + DC integrity"
},
INF:{
name:"Infrastructure Strain Event",
desc:"Physical + network strain escalation",
risk:"HIGH",
effect:"Feeds back into FX instability loop"
}
};

/* LINKS */
const links = [
["FX","DC"],
["DC","CYB"],
["CYB","INF"],
["INF","FX"]
];

let log = [];

/* LOG */
function addLog(msg){
log.push(msg);
document.getElementById("log").innerHTML =
log.slice(-18).map(x=>"> "+x).join("<br>");
}

/* SCENARIO INJECT (FIXED PANEL BEHAVIOR) */
function inject(n){

state[n] += 10;

const s = scenarioMap[n];

/* THIS is the FIX: always overwrite panel cleanly */
document.getElementById("scenarioText").innerHTML =
"<b>▶ " + s.name + "</b><br>" +
"• " + s.desc + "<br>" +
"• Risk: " + s.risk + "<br>" +
"• Effect: " + s.effect;

addLog("INJECT → " + s.name);

evaluate();
}

/* CASCADE ENGINE */
function cascade(){
links.forEach(([a,b])=>{
let p = (state[a]*rules[a]*rules[b])/140;

if(Math.random() < p){
let imp = 2 + Math.random()*4;
state[b] += imp;
addLog(`CASCADE → ${a} → ${b} (+${imp.toFixed(1)})`);
}
});
}

/* DECAY */
function decay(){
for(let k in state){
state[k] *= 0.97;
if(state[k] < 0) state[k] = 0;
}
}

/* RISK MODEL */
function riskScore(){
return (
state.FX*rules.FX +
state.DC*rules.DC +
state.CYB*rules.CYB +
state.INF*rules.INF
)/4;
}

/* SOLUTION ENGINE */
function solution(){
addLog("🧩 SOLUTION ENGINE ACTIVATED");

for(let k in state){
state[k] *= 0.7;
}

addLog("SYSTEM STABILIZED");
}

/* EVALUATION ENGINE */
function evaluate(){

const r = riskScore();
let status = "STABLE";

if(r > 60){
status = "CRITICAL";
solution();
}
else if(r > 30){
status = "DEGRADED";
}

document.getElementById("statusBar").innerText =
"STATUS: " + status;
}

/* RENDER */
function render(){
FX.innerText = state.FX.toFixed(1);
DC.innerText = state.DC.toFixed(1);
CYB.innerText = state.CYB.toFixed(1);
INF.innerText = state.INF.toFixed(1);
}

/* LOOP */
function tick(){
cascade();
decay();
evaluate();
render();
}

setInterval(tick,1000);

/* RESET */
function resetAll(){
for(let k in state) state[k]=0;
addLog("SYSTEM RESET");
}

/* INIT */
render();

</script>

</body>
</html>
