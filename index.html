<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SPD v10 LIVE</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="header">
🛰 SPD PILOT SYSTEM · RESILIENCE SIMULATION ENGINE
</div>

<div class="status-bar">
● SYSTEM ONLINE | Simulation Kernel Active
</div>

<h1>🧠 SPD v10 Simulation Console</h1>

<div class="panel">
  <h2>Core Engine</h2>

  <button onclick="runScenario('FX')">FX Stress</button>
  <button onclick="runScenario('DC')">Cooling Failure</button>
  <button onclick="runScenario('CYB')">Ransomware</button>
  <button onclick="runScenario('INF')">Network Outage</button>
</div>

<div class="panel">
  <h2>Event Injection</h2>

  <button onclick="injectEvent('FX_SPIKE')">FX Spike</button>
  <button onclick="injectEvent('BOND_STRESS')">Bond Stress</button>
  <button onclick="injectEvent('CYBER_ATTACK')">Cyber Attack</button>
  <button onclick="injectEvent('INFRA_FAILURE')">Infra Failure</button>
</div>

<div class="panel">
  <h2>System Output</h2>
  <div id="output">Booting...</div>
</div>

<div class="panel">
  <h2>System Cascade Graph</h2>
  <canvas id="graph"></canvas>
</div>

<!-- 🧪 LIVE DIAGNOSTICS PANEL (correct placement) -->
<div class="panel">
  <h2>🧪 Live Diagnostics</h2>
  <pre id="diag">Checking system...</pre>
</div>

<div class="panel">
  <h2>Audit Log</h2>

  <button onclick="showAudit()">Show</button>
  <button onclick="clearAudit()">Clear</button>

  <pre id="audit"></pre>
</div>

<!-- 🧠 CORE SCRIPTS -->
<script src="audit.js"></script>
<script src="engine.js"></script>
<script src="cascade-graph.js"></script>
<script src="ui.js"></script>

<!-- 🛡️ DEPENDENCY SAFETY LAYER (LAST = IMPORTANT) -->
<script src="dependency-lock.js"></script>

</body>
</html>
