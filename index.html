<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SPD v12 // ENG ENERGY MODULE UPGRADE</title>

<style>
body {
  margin:0;
  background:#05070b;
  color:#cfe8ff;
  font-family:Arial;
}

.header {
  padding:10px;
  background:#0b1220;
  text-align:center;
}

#statusBar {
  text-align:center;
  padding:6px;
  background:#0a0f18;
}

.panel {
  display:flex;
  justify-content:space-around;
  padding:10px;
}

.card {
  background:#0e1a2b;
  width:18%;
  padding:12px;
  text-align:center;
}

.value { font-size:22px; }

#alerts {
  position:absolute;
  right:10px;
  top:60px;
  width:280px;
  height:280px;
  background:#0a0f18;
  font-size:11px;
  overflow:auto;
  padding:10px;
}

#systemView {
  position:absolute;
  left:10px;
  top:60px;
  width:280px;
  height:280px;
  background:#0a0f18;
  font-size:12px;
  padding:10px;
}
</style>
</head>

<body>

<div class="header">🛰 SPD v12 // ENERGY RESILIENCE MODULE</div>

<div id="statusBar">STATUS: INIT</div>

<div class="panel">
  <div class="card">FX<div id="FX" class="value">0</div></div>
  <div class="card">DC<div id="DC" class="value">0</div></div>
  <div class="card">CYB<div id="CYB" class="value">0</div></div>
  <div class="card">INF<div id="INF" class="value">0</div></div>
  <div class="card">ENG<div id="ENG" class="value">0</div></div>
</div>

<div id="systemView"></div>
<div id="alerts"></div>

<div style="text-align:center;">
  <button onclick="inject('FX')">FX</button>
  <button onclick="inject('DC')">DC</button>
  <button onclick="inject('CYB')">CYB</button>
  <button onclick="inject('INF')">INF</button>

  <button onclick="energyShock()">ENERGY SHOCK</button>
  <button onclick="stabilise()">STABILISE</button>
  <button onclick="reset()">RESET</button>
</div>

<script>

/* =========================
   FULL STATE (UPGRADED ENG)
========================= */

const domains = {
  FX:{risk:0},
  DC:{risk:0},
  CYB:{risk:0},
  INF:{risk:0},

  ENG:{
    oilPrice:80,
    cpoPrice:1100,
    fiscalPressure:0.5,
    reserveLevel:0.6,
    importDependency:0.4,
    biofuelCapacity:0.6,
    energyStress:0
  }
};

let log = [];

/* =========================
   BASIC INJECTION
========================= */

function inject(k){
  domains[k].risk += 2;
  log.push(k+" +2");
}

/* =========================
   ENG ENGINE (NEW CORE)
========================= */

function computeEnergyRisk(e){

  let stress = 0;

  stress += (e.oilPrice - 70) * 0.05;
  stress += (e.cpoPrice - 1000) * 0.002;
  stress += e.fiscalPressure * 10;
  stress += (1 - e.reserveLevel) * 12;
  stress += e.importDependency * 8;
  stress -= e.biofuelCapacity * 6;

  if(stress < 0) stress = 0;

  return stress;
}

function energyShock(){
  const e = domains.ENG;

  e.oilPrice += 15;
  e.importDependency += 0.1;
  e.fiscalPressure += 0.1;

  log.push("ENERGY SHOCK TRIGGERED");
}

function stabilise(){
  const e = domains.ENG;

  e.reserveLevel += 0.1;
  e.fiscalPressure -= 0.1;

  log.push("ENERGY STABILISATION DEPLOYED");
}

/* =========================
   COCKPIT DASHBOARD ENGINE
========================= */

const COCKPIT_DASHBOARD = {

  render(d){

    const engRisk = computeEnergyRisk(d.ENG);

    const summary = {
      FX:d.FX.risk,
      DC:d.DC.risk,
      CYB:d.CYB.risk,
      INF:d.INF.risk,
      ENG:engRisk
    };

    const globalRisk =
      summary.FX + summary.DC + summary.CYB + summary.INF + summary.ENG;

    return {
      globalRisk,
      status:
        globalRisk>18?"CRITICAL":
        globalRisk>10?"WARNING":"STABLE",
      engRisk,
      systemView:
        globalRisk>18?"SYSTEM COLLAPSE RISK":
        globalRisk>10?"SYSTEM UNDER STRESS":"SYSTEM STABLE"
    };
  }
};

/* =========================
   RESET
========================= */

function reset(){
  for(const k in domains){
    if(k==="ENG"){
      Object.assign(domains.ENG,{
        oilPrice:80,
        cpoPrice:1100,
        fiscalPressure:0.5,
        reserveLevel:0.6,
        importDependency:0.4,
        biofuelCapacity:0.6,
        energyStress:0
      });
    } else {
      domains[k].risk = 0;
    }
  }
  log=[];
}

/* =========================
   RENDER LOOP
========================= */

function render(){

  const view = COCKPIT_DASHBOARD.render(domains);

  FX.innerText = domains.FX.risk;
  DC.innerText = domains.DC.risk;
  CYB.innerText = domains.CYB.risk;
  INF.innerText = domains.INF.risk;

  ENG.innerText = view.engRisk.toFixed(1);

  statusBar.innerText = "STATUS: " + view.status;

  systemView.innerHTML =
    "<b>"+view.systemView+"</b><br><br>" +
    "ENG RISK: " + view.engRisk.toFixed(2);

  alerts.innerHTML =
    "<b>EVENT LOG</b><br>" + log.slice(-12).join("<br>");
}

/* =========================
   LOOP
========================= */

setInterval(render, 800);
render();

</script>

</body>
</html>
