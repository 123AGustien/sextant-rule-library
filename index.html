<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SPD FULL COCKPIT</title>

<style>
body {
  margin: 0;
  background: #05080c;
  color: #d7e6ff;
  font-family: Arial, sans-serif;
  overflow: hidden;
}

/* TOP STATUS BAR */
.topbar {
  height: 42px;
  background: #0c1520;
  border-bottom: 1px solid #1c2b3a;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 15px;
  font-size: 13px;
}

/* GRID LAYOUT */
.grid {
  display: grid;
  grid-template-columns: 240px 1fr 300px;
  height: calc(100vh - 42px);
}

/* LEFT CONTROL PANEL */
.left {
  background: #0a111a;
  border-right: 1px solid #1c2b3a;
  padding: 10px;
}

button {
  width: 100%;
  padding: 10px;
  margin-bottom: 8px;
  background: #132231;
  border: 1px solid #263a4d;
  color: white;
  cursor: pointer;
  font-size: 12px;
}

button:hover {
  background: #1a3144;
}

/* CENTER COCKPIT */
.center {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

canvas {
  background: #0b141e;
  border: 1px solid #223344;
}

/* RIGHT PANEL */
.right {
  background: #0a111a;
  border-left: 1px solid #1c2b3a;
  padding: 10px;
  font-size: 12px;
  overflow-y: auto;
}

.log {
  opacity: 0.85;
  line-height: 1.4;
}

/* STATUS TAGS */
.status {
  font-size: 12px;
}

.good { color: #3cffb0; }
.warn { color: #ffd166; }
.danger { color: #ff4d6d; }
</style>
</head>

<body>

<div class="topbar">
  <div>🛰 SPD FULL COCKPIT · SIMULATION ENGINE</div>
  <div id="sysStatus" class="status good">STATUS: STABLE</div>
</div>

<div class="grid">

  <!-- LEFT -->
  <div class="left">
    <button onclick="runScenario('FX')">FX STRESS EVENT</button>
    <button onclick="runScenario('DC')">DATA CENTRE LOAD</button>
    <button onclick="runScenario('CYB')">CYBER INCIDENT</button>
    <button onclick="runScenario('INF')">INFRASTRUCTURE STRAIN</button>

    <hr style="border-color:#1c2b3a">

    <button onclick="resetSystem()">RESET SYSTEM</button>
  </div>

  <!-- CENTER -->
  <div class="center">
    <canvas id="graph" width="520" height="300"></canvas>
  </div>

  <!-- RIGHT -->
  <div class="right">
    <div id="log"></div>
  </div>

</div>

<script>
let state = {
  FX: 0,
  DC: 0,
  CYB: 0,
  INF: 0
};

let log = [];

/* ---------------- LOG ---------------- */
function pushLog(msg) {
  const time = new Date().toLocaleTimeString();
  log.push(`[${time}] ${msg}`);

  document.getElementById("log").innerHTML =
    log.slice(-15).join("<br>");
}

/* ---------------- SCENARIOS ---------------- */
function runScenario(type) {
  state[type] += 2;

  pushLog(`SCENARIO TRIGGERED: ${type}`);

  evaluateSystem();
  updateGraph();
}

/* ---------------- SYSTEM EVALUATION ---------------- */
function evaluateSystem() {
  const total = Object.values(state).reduce((a, b) => a + b, 0);

  const status = document.getElementById("sysStatus");

  if (total < 8) {
    status.textContent = "STATUS: STABLE";
    status.className = "status good";
  } 
  else if (total < 15) {
    status.textContent = "STATUS: DEGRADED";
    status.className = "status warn";
  } 
  else {
    status.textContent = "STATUS: STRESSED";
    status.className = "status danger";
  }
}

/* ---------------- GRAPH ---------------- */
function updateGraph() {
  const canvas = document.getElementById("graph");
  const ctx = canvas.getContext("2d");

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  const keys = Object.keys(state);
  const vals = Object.values(state);
  const max = Math.max(...vals, 5);

  keys.forEach((k, i) => {
    const bar = (vals[i] / max) * 240;
    const x = 80 + i * 100;

    ctx.fillStyle = "#00ffd5";
    ctx.fillRect(x, 260 - bar, 45, bar);

    ctx.fillStyle = "#ffffff";
    ctx.fillText(k, x + 10, 280);
  });
}

/* ---------------- RESET ---------------- */
function resetSystem() {
  state = { FX: 0, DC: 0, CYB: 0, INF: 0 };
  pushLog("SYSTEM RESET EXECUTED");

  evaluateSystem();
  updateGraph();
}

/* ---------------- INIT ---------------- */
updateGraph();
evaluateSystem();
</script>

</body>
</html>
