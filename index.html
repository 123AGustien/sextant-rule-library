<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SPD v11.6 // CLEAN DIGITAL TWIN CORE</title>

<style>
body {
  margin: 0;
  background: #05070b;
  color: #cfe8ff;
  font-family: Arial, sans-serif;
  overflow: hidden;
}

.header {
  padding: 10px;
  background: #0b1220;
  font-size: 14px;
}

#statusBar {
  text-align: center;
  padding: 6px;
  background: #0a0f18;
  font-size: 13px;
}

/* PANELS */
.panel {
  display: flex;
  justify-content: space-around;
  padding: 10px;
}

.card {
  background: #0e1a2b;
  width: 22%;
  padding: 12px;
  text-align: center;
  border-radius: 6px;
}

.value {
  font-size: 26px;
}

/* GRAPH */
#graph {
  position: relative;
  height: 240px;
  margin: 10px;
}

.node {
  position: absolute;
  width: 52px;
  height: 52px;
  border-radius: 50%;
  background: #1f3b5c;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  transition: 0.25s;
}

/* CONTROLS */
.buttons {
  text-align: center;
  margin: 8px;
}

button {
  padding: 7px 10px;
  margin: 3px;
  background: #1f3b5c;
  color: white;
  border: none;
  cursor: pointer;
}

/* EXPLAIN PANEL */
#explain {
  position: absolute;
  right: 10px;
  top: 60px;
  width: 240px;
  background: #0a0f18;
  padding: 10px;
  font-size: 11px;
  border-left: 2px solid #1f3b5c;
  height: 200px;
  overflow-y: auto;
}
</style>
</head>

<body>

<div class="header">
🛰 SPD v11.6 // CLEAN ARCHITECTURE DIGITAL TWIN CORE (OJK READY)
</div>

<div id="statusBar">STATUS: READY</div>

<div class="panel">
  <div class="card">FX<div id="FX" class="value">0.0</div></div>
  <div class="card">DC<div id="DC" class="value">0.0</div></div>
  <div class="card">CYB<div id="CYB" class="value">0.0</div></div>
  <div class="card">INF<div id="INF" class="value">0.0</div></div>
</div>

<div id="graph">
  <div class="node" id="nFX">FX</div>
  <div class="node" id="nDC">DC</div>
  <div class="node" id="nCYB">CYB</div>
  <div class="node" id="nINF">INF</div>
</div>

<div class="buttons">
  <button onclick="inject('FX')">FX STRESS</button>
  <button onclick="inject('DC')">DC LOAD</button>
  <button onclick="inject('CYB')">CYBER EVENT</button>
  <button onclick="inject('INF')">INFRA STRAIN</button>
  <button onclick="reset()">RESET</button>
</div>

<div id="explain">Explain: idle</div>

<script>

/* =========================
   SINGLE SOURCE OF TRUTH
========================= */

const state = {
  FX: { v: 0, s: 0.7, x: 80, y: 80 },
  DC: { v: 0, s: 0.9, x: 220, y: 40 },
  CYB:{ v: 0, s: 0.8, x: 360, y: 80 },
  INF:{ v: 0, s: 0.85, x: 220, y: 140 }
};

const LINKS = [
  ["FX","DC"],
  ["DC","CYB"],
  ["CYB","INF"],
  ["INF","FX"]
];

let log = [];

/* =========================
   ENGINE LAYER
========================= */

function inject(node){
  state[node].v += 10;
  logEvent("INJECT", node);
}

function cascade(){
  LINKS.forEach(([a,b])=>{
    const A = state[a];
    const B = state[b];

    const p = (A.v * A.s * B.s) / 120;

    if(Math.random() < p){
      const impact = 3 + Math.random() * 4;
      B.v += impact;

      logEvent("CASCADE", `${a}→${b}`, impact);
      explain(`${a} influenced ${b} (+${impact.toFixed(1)})`);
    }
  });
}

function decay(){
  for(let k in state){
    state[k].v *= 0.97;
    state[k].v = Math.max(0, state[k].v);
  }
}

/* =========================
   TIME ENGINE
========================= */

function tick(){
  cascade();
  decay();
  render();
}

setInterval(tick, 1000);

/* =========================
   RENDER ENGINE (CLEAN)
========================= */

function render(){

  for(let k in state){
    const n = state[k];
    const el = document.getElementById(k);

    el.innerText = k + " " + n.v.toFixed(0);

    document.getElementById("n"+k).style.left = n.x + "px";
    document.getElementById("n"+k).style.top  = n.y + "px";

    document.getElementById("n"+k).style.transform =
      `scale(${1 + n.v/50})`;

    document.getElementById("n"+k).style.background =
      n.v > 40 ? "#ff3b3b" :
      n.v > 20 ? "#ffb020" :
      "#1f3b5c";
  }
}

/* =========================
   RESET
========================= */

function reset(){
  for(let k in state){
    state[k].v = 0;
  }
  logEvent("RESET");
  explain("System reset to baseline state");
}

/* =========================
   EXPLAIN + AUDIT
========================= */

function logEvent(type, detail, impact){
  log.push({
    time: new Date().toISOString(),
    type,
    detail,
    impact
  });
}

function explain(msg){
  document.getElementById("explain").innerText = msg;
}

/* INIT */
render();

</script>

</body>
</html>
