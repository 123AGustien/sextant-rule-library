<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SPD v11.3 // ADAPTATION & GOVERNANCE LAYER</title>

<style>
body {
  margin: 0;
  background: #05070b;
  color: #cfe8ff;
  font-family: Arial, sans-serif;
  overflow: hidden;
}

.header {
  padding: 12px;
  background: #0b1220;
  font-size: 14px;
}

.ojk, .gov {
  background:#0b1220;
  padding:12px;
  font-size:12px;
  border-bottom:1px solid #1f3b5c;
}

.panel {
  display: flex;
  justify-content: space-around;
  padding: 20px;
}

.card {
  background: #0e1a2b;
  padding: 20px;
  width: 20%;
  text-align: center;
  border-radius: 8px;
}

.value {
  font-size: 26px;
  margin-top: 10px;
}

.buttons {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin: 10px;
  flex-wrap: wrap;
}

button {
  padding: 8px 12px;
  background: #1f3b5c;
  color: white;
  border: none;
  cursor: pointer;
}

#statusBar {
  text-align: center;
  padding: 8px;
  font-size: 13px;
  background: #0a0f18;
}

#audit {
  position: absolute;
  bottom: 0;
  height: 140px;
  width: 100%;
  background: #0a0f18;
  overflow-y: auto;
  font-size: 12px;
  padding: 10px;
}
</style>
</head>

<body>

<div class="header">
🛰 SPD v11.3 // ADAPTATION & GOVERNANCE LAYER
</div>

<!-- ================= OJK LAYER ================= -->
<div class="ojk">
<b>OJK SANDBOX INTERFACE</b><br>
Scenario-based systemic risk simulation (non-execution model)
<br><br>

Scenario:
<select id="scenarioInfo">
  <option value="BOND_CRISIS">Bond Crisis</option>
  <option value="CYBER_WAR">Cyber War</option>
  <option value="GRID_FAILURE">Grid Failure</option>
</select>

<button onclick="loadScenarioInfo()">Load Brief</button>
<button onclick="toggleExplain()">Explain Mode</button>
<button onclick="exportAudit()">Export Audit</button>

<div id="scenarioPanel" style="margin-top:8px;color:#9ecbff;"></div>
</div>

<!-- ================= GOVERNANCE LAYER ================= -->
<div class="gov">
<b>🛰 GOVERNANCE ADAPTATION LAYER</b><br><br>

Regulatory Mode:
<select id="regMode">
  <option value="SANDBOX">Sandbox</option>
  <option value="CONTROLLED">Controlled</option>
  <option value="AUDIT_HEAVY">Audit Heavy</option>
</select>

<button onclick="applyMode()">Apply Mode</button>
<button onclick="addFeedback()">Add Feedback Rule</button>
<button onclick="exportConfig()">Export Config</button>

<div id="modePanel" style="margin-top:8px;color:#9ecbff;"></div>
</div>

<div id="statusBar">STATUS: READY</div>

<!-- ================= CORE SIM ================= -->
<div class="panel">
  <div class="card">FX<div class="value" id="FX">0</div></div>
  <div class="card">DC<div class="value" id="DC">0</div></div>
  <div class="card">CYB<div class="value" id="CYB">0</div></div>
  <div class="card">INF<div class="value" id="INF">0</div></div>
</div>

<div class="buttons">
  <button onclick="runScenario('BOND_CRISIS')">BOND CRISIS</button>
  <button onclick="runScenario('CYBER_WAR')">CYBER WAR</button>
  <button onclick="runScenario('GRID_FAILURE')">GRID FAILURE</button>
  <button onclick="inject('FX')">FX STRESS</button>
  <button onclick="reset()">RESET</button>
</div>

<div id="audit"></div>

<script>

/* ================= CORE STATE ================= */

const NODES = {
  FX:{value:0,sens:0.7},
  DC:{value:0,sens:0.9},
  CYB:{value:0,sens:0.8},
  INF:{value:0,sens:0.85}
};

const EDGES = [
  {from:"FX",to:"DC",w:0.8},
  {from:"DC",to:"CYB",w:0.7},
  {from:"CYB",to:"INF",w:0.6},
  {from:"INF",to:"FX",w:0.5}
];

const SCENARIOS = {
  BOND_CRISIS:{FX:35,DC:10,CYB:5},
  CYBER_WAR:{CYB:40,DC:25,INF:10},
  GRID_FAILURE:{INF:50,DC:20,FX:15}
};

const SCENARIO_DOCS = {
  BOND_CRISIS:{
    objective:"Sovereign bond stress propagation model",
    assumptions:["FX leads shock","DC liquidity stress","CYB secondary reaction"],
    expected:"FX → DC cascade likely"
  },
  CYBER_WAR:{
    objective:"Cyber disruption propagation model",
    assumptions:["CYB primary shock","infra degradation follows"],
    expected:"CYB dominates instability"
  },
  GRID_FAILURE:{
    objective:"Infrastructure failure propagation",
    assumptions:["INF primary source"],
    expected:"INF → DC → FX reverse cascade possible"
  }
};

/* ================= GOVERNANCE ================= */

let GOVERNANCE = {
  mode:"SANDBOX",
  volatilityCap:1.0,
  cascadeSensitivity:1.0,
  feedbackRules:[]
};

let log=[];

/* ================= SCENARIO ================= */

function runScenario(name){
  const s = SCENARIOS[name];
  for(let k in s){
    NODES[k].value += s[k];
  }
  audit("SCENARIO",{name});
  render();
}

/* ================= INJECT ================= */

function inject(n){
  NODES[n].value += 10;
  audit("INJECT",{n});
}

/* ================= CASCADE ENGINE ================= */

function cascade(){
  EDGES.forEach(e=>{
    const f=NODES[e.from];
    const t=NODES[e.to];

    let p = (f.value * e.w * t.sens / 100);

    p *= GOVERNANCE.cascadeSensitivity;

    if(p > GOVERNANCE.volatilityCap){
      p = GOVERNANCE.volatilityCap;
    }

    GOVERNANCE.feedbackRules.forEach(r=>{
      if(r.includes(e.to) && r.includes("reduce")){
        p *= 0.8;
      }
    });

    if(Math.random() < p){
      t.value += 5;
      audit("CASCADE",{from:e.from,to:e.to,prob:p.toFixed(3)});
    }
  });
}

/* ================= TICK ================= */

function tick(){
  for(let k in NODES){
    NODES[k].value *= 0.97;
  }
  cascade();
  render();
}

setInterval(tick,1000);

/* ================= RESET ================= */

function reset(){
  for(let k in NODES){
    NODES[k].value = 0;
  }
  audit("RESET",{});
  render();
}

/* ================= AUDIT ================= */

function audit(type,data){
  log.push({
    time:new Date().toISOString(),
    type,
    data,
    snapshot:{
      FX:NODES.FX.value,
      DC:NODES.DC.value,
      CYB:NODES.CYB.value,
      INF:NODES.INF.value
    }
  });
}

/* ================= GOVERNANCE CONTROLS ================= */

function applyMode(){
  const m=document.getElementById("regMode").value;
  GOVERNANCE.mode=m;

  if(m==="SANDBOX"){
    GOVERNANCE.volatilityCap=1.0;
    GOVERNANCE.cascadeSensitivity=1.0;
  }

  if(m==="CONTROLLED"){
    GOVERNANCE.volatilityCap=0.6;
    GOVERNANCE.cascadeSensitivity=0.7;
  }

  if(m==="AUDIT_HEAVY"){
    GOVERNANCE.volatilityCap=0.4;
    GOVERNANCE.cascadeSensitivity=0.5;
  }

  updateModePanel();
}

function addFeedback(){
  const r=prompt("Enter rule (e.g. CYB:reduce)");
  if(r){
    GOVERNANCE.feedbackRules.push(r);
    audit("FEEDBACK",{r});
    updateModePanel();
  }
}

function updateModePanel(){
  document.getElementById("modePanel").innerHTML=
  `Mode: ${GOVERNANCE.mode}<br>
  Vol Cap: ${GOVERNANCE.volatilityCap}<br>
  Sensitivity: ${GOVERNANCE.cascadeSensitivity}<br>
  Rules: ${GOVERNANCE.feedbackRules.length}`;
}

/* ================= SCENARIO INFO ================= */

function loadScenarioInfo(){
  const k=document.getElementById("scenarioInfo").value;
  const s=SCENARIO_DOCS[k];

  document.getElementById("scenarioPanel").innerHTML=
  `<b>${k}</b><br>${s.objective}<br><br>${s.assumptions.map(a=>"• "+a).join("<br>")}<br><br>${s.expected}`;
}

/* ================= EXPORT ================= */

function exportAudit(){
  const blob=new Blob([JSON.stringify(log,null,2)],{type:"application/json"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="SPD_v11_3_AUDIT.json";
  a.click();
}

/* ================= RENDER ================= */

function render(){
  FX.innerText=NODES.FX.value.toFixed(1);
  DC.innerText=NODES.DC.value.toFixed(1);
  CYB.innerText=NODES.CYB.value.toFixed(1);
  INF.innerText=NODES.INF.value.toFixed(1);

  audit.innerHTML=log.slice(-10).map(e=>
    `[${e.time}] ${e.type}`
  ).join("<br>");
}

/* INIT */
render();

</script>

</body>
</html>
