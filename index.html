<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SPD v12 // PIPELINE DIGITAL TWIN</title>

<style>
body {
  margin: 0;
  background: #05070b;
  color: #cfe8ff;
  font-family: Arial, sans-serif;
}

.header {
  padding: 10px;
  background: #0b1220;
  text-align: center;
  font-size: 14px;
}

#statusBar {
  text-align: center;
  padding: 8px;
  background: #0a0f18;
  font-size: 13px;
}

.panel {
  display: flex;
  justify-content: space-around;
  padding: 10px;
}

.card {
  background: #0e1a2b;
  width: 22%;
  padding: 12px;
  text-align: center;
  border-radius: 6px;
}

.value {
  font-size: 26px;
}

.buttons {
  text-align: center;
  margin: 10px;
}

button {
  padding: 7px 10px;
  margin: 3px;
  background: #1f3b5c;
  color: white;
  border: none;
  cursor: pointer;
}

#log {
  position: absolute;
  right: 10px;
  top: 60px;
  width: 300px;
  height: 260px;
  background: #0a0f18;
  padding: 10px;
  font-size: 11px;
  overflow-y: auto;
  border-left: 2px solid #1f3b5c;
}
</style>
</head>

<body>

<div class="header">
🛰 SPD v12 // PIPELINE CONTROLLED DIGITAL TWIN
</div>

<div id="statusBar">STATUS: INITIALIZED</div>

<div class="panel">
  <div class="card">FX<div id="FX" class="value">0.0</div></div>
  <div class="card">DC<div id="DC" class="value">0.0</div></div>
  <div class="card">CYB<div id="CYB" class="value">0.0</div></div>
  <div class="card">INF<div id="INF" class="value">0.0</div></div>
</div>

<div class="buttons">
  <button onclick="control('FX')">FX STRESS</button>
  <button onclick="control('DC')">DC LOAD</button>
  <button onclick="control('CYB')">CYBER EVENT</button>
  <button onclick="control('INF')">INFRA STRAIN</button>
  <button onclick="control('RESET')">RESET</button>
</div>

<div id="log">PIPELINE LOG ACTIVE</div>

<script>

/* =========================
   STATE STORE
========================= */

const STATE = {
  FX: 0,
  DC: 0,
  CYB: 0,
  INF: 0,

  reset(){
    this.FX = this.DC = this.CYB = this.INF = 0;
    log("STATE RESET");
  }
};

/* =========================
   PIPELINE 1: ACTION MAP
========================= */

const ACTION_MAP = {
  FX: () => RULE_ENGINE.inject("FX"),
  DC: () => RULE_ENGINE.inject("DC"),
  CYB: () => RULE_ENGINE.inject("CYB"),
  INF: () => RULE_ENGINE.inject("INF"),
  RESET: () => STATE.reset()
};

function control(action){
  log("CONTROL → " + action);
  ACTION_MAP[action]();
}

/* =========================
   PIPELINE 2: RULE ENGINE
========================= */

const RULE_ENGINE = {

  inject(type){

    STATE[type] += 10;
    log("RULE ENGINE → inject " + type);

    RISK_MODEL.update();
    SOLUTION_ENGINE.evaluate();
    UI_UPDATE.render();
  }
};

/* =========================
   PIPELINE 3: RISK MODEL
========================= */

const RISK_MODEL = {

  score: 0,

  update(){

    const total =
      STATE.FX +
      STATE.DC +
      STATE.CYB +
      STATE.INF;

    this.score = total / 4;

    log("RISK → " + this.score.toFixed(1));
  }
};

/* =========================
   PIPELINE 4: SOLUTION ENGINE
========================= */

const SOLUTION_ENGINE = {

  evaluate(){

    if(RISK_MODEL.score > 60){
      SEQUENCE_EXECUTOR.run("CRITICAL");
      log("SOLUTION → CRITICAL");
    }
    else if(RISK_MODEL.score > 30){
      SEQUENCE_EXECUTOR.run("DEGRADED");
      log("SOLUTION → DEGRADED");
    }
  }
};

/* =========================
   PIPELINE 5: SEQUENCE EXECUTOR
========================= */

const SEQUENCE_EXECUTOR = {

  run(level){

    if(level === "CRITICAL"){

      STATE.FX *= 0.7;
      STATE.DC *= 0.7;
      STATE.CYB *= 0.6;
      STATE.INF *= 0.8;
    }

    if(level === "DEGRADED"){

      STATE.FX *= 0.85;
      STATE.DC *= 0.85;
      STATE.CYB *= 0.9;
      STATE.INF *= 0.9;
    }

    log("SEQUENCE EXECUTED → " + level);

    UI_UPDATE.render();
  }
};

/* =========================
   PIPELINE 6: UI UPDATE
========================= */

const UI_UPDATE = {

  render(){

    FX.innerText = STATE.FX.toFixed(1);
    DC.innerText = STATE.DC.toFixed(1);
    CYB.innerText = STATE.CYB.toFixed(1);
    INF.innerText = STATE.INF.toFixed(1);

    statusBar.innerText =
      "STATUS | RISK: " + RISK_MODEL.score.toFixed(1);
  }
};

/* =========================
   LOG SYSTEM
========================= */

function log(msg){

  const el = document.getElementById("log");

  const time = new Date().toLocaleTimeString();

  el.innerHTML =
    `[${time}] ${msg}<br>` +
    el.innerHTML;
}

/* INIT */
UI_UPDATE.render();

</script>

</body>
</html>
