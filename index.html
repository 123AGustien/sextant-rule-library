<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sextant Single-Source SPA v2</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0b0f14;
    color: #2bd4ff;
}

.header {
    background:#0f172a;
    padding:12px;
    border-bottom:1px solid #1f2a44;
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-size:12px;
    color:#9fb0c3;
}

h1 {
    margin: 15px;
    font-size: 20px;
}

.panel {
    margin: 15px;
    padding: 15px;
    background: #111827;
    border: 1px solid #2a2f3a;
    border-radius: 8px;
}

button {
    padding: 10px;
    margin: 5px;
    cursor: pointer;
    background: #1f2937;
    color: white;
    border: 1px solid #374151;
    border-radius: 6px;
}

button:hover {
    background:#374151;
}

pre {
    background:#0a0f1f;
    padding:10px;
    overflow:auto;
}

/* OUTPUT IS CONTROLLED ONLY BY ENGINE */
#output {
    min-height: 60px;
    padding: 10px;
    background: #0a0f1f;
    border: 1px solid #2a2f3a;
}

.status {
    font-size: 12px;
    color: #7aa2b7;
}
</style>
</head>

<body>

<div class="header">
    <div>🛰 SEXTANT SINGLE-SOURCE ENGINE SPA v2</div>
    <button onclick="showAudit()">AUDIT</button>
</div>

<h1>🧠 Resilience Simulation Core</h1>

<!-- ENGINE CONTROLS -->
<div class="panel">
<h2>Scenario Engine</h2>

<button onclick="runScenario('FIN-001')">Power Surge</button>
<button onclick="runScenario('DC-001')">Cooling Failure</button>
<button onclick="runScenario('CYB-001')">Ransomware</button>
<button onclick="runScenario('INF-001')">Network Outage</button>

<p class="status">Single-source execution model active</p>
</div>

<!-- OUTPUT (NO STATIC TEXT ALLOWED) -->
<div class="panel">
<h2>System Output</h2>
<div id="output">SYSTEM INITIALIZED</div>
</div>

<!-- AUDIT -->
<div class="panel">
<h2>Audit Log</h2>
<button onclick="clearAudit()">Clear</button>
<pre id="audit"></pre>
</div>

<script>

/* =========================
   SINGLE SOURCE OF TRUTH
========================= */

let state = {
    risk: 0
};

let auditLog = [];

/* =========================
   ENGINE (ONLY SOURCE OF OUTPUT)
========================= */

function runScenario(code) {

    let event = "";
    let impact = 0;

    switch(code) {
        case "FIN-001":
            event = "POWER SURGE";
            impact = 2;
            break;

        case "DC-001":
            event = "COOLING FAILURE";
            impact = 3;
            break;

        case "CYB-001":
            event = "RANSOMWARE ATTACK";
            impact = 5;
            break;

        case "INF-001":
            event = "NETWORK OUTAGE";
            impact = 4;
            break;
    }

    // UPDATE STATE (ONLY SOURCE)
    state.risk += impact;

    // AUDIT
    auditLog.push({
        time: new Date().toISOString(),
        event,
        impact,
        risk: state.risk
    });

    // RENDER ONLY FROM ENGINE (NO STATIC TEXT ANYWHERE)
    render({
        event,
        impact,
        risk: state.risk,
        status: "EXECUTED"
    });
}

/* =========================
   SINGLE RENDER PIPELINE
========================= */

function render(data) {

    document.getElementById("output").innerHTML =
        "EVENT: " + data.event + "<br>" +
        "IMPACT: " + data.impact + "<br>" +
        "TOTAL RISK: " + data.risk + "<br>" +
        "STATUS: " + data.status;
}

/* =========================
   AUDIT CONTROL
========================= */

function showAudit() {
    document.getElementById("audit").textContent =
        JSON.stringify(auditLog, null, 2);
}

function clearAudit() {
    auditLog = [];
    state.risk = 0;
    document.getElementById("audit").textContent = "CLEARED";
    render({
        event: "RESET",
        impact: 0,
        risk: 0,
        status: "RESET COMPLETE"
    });
}

</script>

</body>
</html>
