<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SPD v10 // STABLE COCKPIT</title>

<style>
body {
  margin: 0;
  background: #05070b;
  color: #cfe8ff;
  font-family: Arial, sans-serif;
  overflow: hidden;
}

.header {
  padding: 10px;
  background: #0b1220;
  font-size: 14px;
  text-align: center;
}

#statusBar {
  text-align: center;
  padding: 6px;
  background: #0a0f18;
  font-size: 13px;
}

.panel {
  display: flex;
  justify-content: space-around;
  padding: 10px;
}

.card {
  background: #0e1a2b;
  width: 22%;
  padding: 12px;
  text-align: center;
  border-radius: 6px;
}

.value {
  font-size: 26px;
}

#graph {
  position: relative;
  height: 240px;
  margin: 10px;
}

.node {
  position: absolute;
  width: 55px;
  height: 55px;
  border-radius: 50%;
  background: #1f3b5c;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  cursor: pointer;
  transition: 0.2s;
}

.buttons {
  text-align: center;
  margin: 10px;
}

button {
  padding: 7px 10px;
  margin: 3px;
  background: #1f3b5c;
  color: white;
  border: none;
  cursor: pointer;
}

#log {
  position: absolute;
  right: 10px;
  top: 60px;
  width: 260px;
  height: 260px;
  background: #0a0f18;
  font-size: 11px;
  overflow-y: auto;
  padding: 10px;
  border-left: 2px solid #1f3b5c;
}
</style>
</head>

<body>

<div class="header">
🛰 SPD v10 // STABLE CLOSED LOOP COCKPIT
</div>

<div id="statusBar">STATUS: STABLE</div>

<div class="panel">
  <div class="card">FX<div id="FX" class="value">0</div></div>
  <div class="card">DC<div id="DC" class="value">0</div></div>
  <div class="card">CYB<div id="CYB" class="value">0</div></div>
  <div class="card">INF<div id="INF" class="value">0</div></div>
</div>

<div id="graph">
  <div class="node" id="nFX" onclick="inject('FX')">FX</div>
  <div class="node" id="nDC" onclick="inject('DC')">DC</div>
  <div class="node" id="nCYB" onclick="inject('CYB')">CYB</div>
  <div class="node" id="nINF" onclick="inject('INF')">INF</div>
</div>

<div class="buttons">
  <button onclick="inject('FX')">FX STRESS</button>
  <button onclick="inject('DC')">DC LOAD</button>
  <button onclick="inject('CYB')">CYBER EVENT</button>
  <button onclick="inject('INF')">INFRA STRAIN</button>
  <button onclick="reset()">RESET</button>
</div>

<div id="log">LOG READY</div>

<script>

/* ================= STATE CORE ================= */
const state = {
  FX: {v:0, x:80, y:80},
  DC: {v:0, x:220, y:40},
  CYB:{v:0, x:360, y:80},
  INF:{v:0, x:220, y:140}
};

const LINKS = [
  ["FX","DC"],
  ["DC","CYB"],
  ["CYB","INF"],
  ["INF","FX"]
];

let log = [];

/* ================= ENGINE ================= */
function inject(node){
  state[node].v += 10;
  log.push(`${node} +10`);
}

function cascade(){
  LINKS.forEach(([a,b]) => {
    const p = state[a].v / 120;
    if(Math.random() < p){
      state[b].v += 1 + Math.random()*3;
      log.push(`${a} → ${b}`);
    }
  });
}

function decay(){
  for(let k in state){
    state[k].v *= 0.97;
  }
}

function tick(){
  cascade();
  decay();
  render();
}

/* ================= RESET ================= */
function reset(){
  for(let k in state){
    state[k].v = 0;
  }
  log = [];
}

/* ================= RENDER ================= */
function render(){
  FX.innerText = state.FX.v.toFixed(1);
  DC.innerText = state.DC.v.toFixed(1);
  CYB.innerText = state.CYB.v.toFixed(1);
  INF.innerText = state.INF.v.toFixed(1);

  for(let k in state){
    const el = document.getElementById("n"+k);

    el.style.left = state[k].x + "px";
    el.style.top = state[k].y + "px";

    el.style.transform = `scale(${1 + state[k].v/60})`;

    el.style.background =
      state[k].v > 40 ? "#ff3b3b" :
      state[k].v > 20 ? "#ffb020" :
      "#1f3b5c";
  }

  document.getElementById("log").innerHTML =
    log.slice(-12).join("<br>");
}

/* ================= START ================= */
render();
setInterval(tick, 900);

</script>

</body>
</html>
