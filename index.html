<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SPD Simulator - Clean Build</title>
<style>
  body {
    background: #0b0f14;
    color: #ffffff;
    font-family: Arial, sans-serif;
    padding: 20px;
  }

  .panel {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
  }

  button {
    padding: 10px 15px;
    background: #1c2b3a;
    color: white;
    border: 1px solid #2f4b63;
    cursor: pointer;
  }

  button:hover {
    background: #27465f;
  }

  canvas {
    background: #111821;
    border: 1px solid #2f4b63;
    margin-top: 10px;
  }

  #log {
    margin-top: 15px;
    font-size: 12px;
    opacity: 0.8;
    max-height: 120px;
    overflow-y: auto;
  }
</style>
</head>

<body>

<h2>🛰 SPD Simulator — Clean Runtime</h2>

<div class="panel">
  <button onclick="runScenario('FX')">FX Stress</button>
  <button onclick="runScenario('DC')">DC Load</button>
  <button onclick="runScenario('CYB')">Cyber Event</button>
  <button onclick="runScenario('INF')">Infra Strain</button>
</div>

<canvas id="graph" width="320" height="200"></canvas>

<div id="log"></div>

<script>
let state = {
  FX: 0,
  DC: 0,
  CYB: 0,
  INF: 0
};

let auditLog = [];

function audit(type, data) {
  auditLog.push({ type, data, time: Date.now() });

  document.getElementById("log").innerHTML =
    auditLog.slice(-5).map(l =>
      `${l.type}: ${JSON.stringify(l.data)}`
    ).join("<br>");
}

function runScenario(type) {
  state[type] += 2;

  audit("SCENARIO", { type, state });

  updateGraph(state);
}

function injectEvent(event) {
  const map = {
    FX_SPIKE: "FX",
    BOND_OUTFLOW: "FX",
    CYBER_ATTACK: "CYB",
    POWER_FAILURE: "DC",
    INFRA_STRESS: "INF"
  };

  const target = map[event];
  if (!target) return;

  state[target] += 3;

  audit("EVENT", { event, state });

  updateGraph(state);
}

function updateGraph(state) {
  const canvas = document.getElementById("graph");
  const ctx = canvas.getContext("2d");

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  const keys = Object.keys(state);
  const values = Object.values(state);
  const max = Math.max(...values, 5);

  keys.forEach((k, i) => {
    const x = 40 + i * 70;
    const barHeight = (state[k] / max) * 150;

    ctx.fillStyle = "#00ffd5";
    ctx.fillRect(x, 180 - barHeight, 30, barHeight);

    ctx.fillStyle = "#ffffff";
    ctx.fillText(k, x, 195);
  });
}

// initial render
updateGraph(state);
</script>

</body>
</html>
