<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SPD COCKPIT HUD v1.3</title>

<style>
body {
  margin: 0;
  background: #03060a;
  color: #cfe8ff;
  font-family: Arial, sans-serif;
  overflow: hidden;
}

/* GRID OVERLAY (cockpit feel) */
body::before {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background-image:
    linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
}

/* TOP BAR */
.top {
  height: 38px;
  background: #0a111a;
  border-bottom: 1px solid #1b2a3a;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 12px;
  font-size: 12px;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: 200px 1fr 240px;
  height: calc(100vh - 38px);
}

/* LEFT */
.left {
  background: #070d14;
  border-right: 1px solid #1b2a3a;
  padding: 8px;
}

button {
  width: 100%;
  margin-bottom: 6px;
  padding: 8px;
  background: #0f1b28;
  border: 1px solid #223548;
  color: #d6ecff;
  font-size: 11px;
  cursor: pointer;
}

button:hover {
  background: #16283a;
}

/* CENTER */
.center {
  display: flex;
  align-items: center;
  justify-content: center;
  background: #050b12;
}

/* CANVAS */
canvas {
  background: #070f18;
  border: 1px solid #1c2c3c;
}

/* RIGHT */
.right {
  background: #070d14;
  border-left: 1px solid #1b2a3a;
  padding: 8px;
  font-size: 11px;
  overflow-y: auto;
  line-height: 1.4;
}

/* STATUS */
.good { color: #3dffb5; }
.warn { color: #ffd166; }
.bad  { color: #ff4d6d; }

/* STRESS FLICKER */
@keyframes flicker {
  0% { opacity: 1; }
  50% { opacity: 0.92; }
  100% { opacity: 1; }
}

.stressed-flicker {
  animation: flicker 0.12s infinite;
}
</style>
</head>

<body>

<div class="top">
  <div>🛰 SPD COCKPIT HUD // RULE ENGINE ACTIVE</div>
  <div id="status" class="good">STABLE</div>
</div>

<div class="grid">

  <!-- LEFT -->
  <div class="left">
    <button onclick="runScenario('FX')">FX STRESS</button>
    <button onclick="runScenario('DC')">DC LOAD</button>
    <button onclick="runScenario('CYB')">CYBER EVENT</button>
    <button onclick="runScenario('INF')">INFRA STRAIN</button>
    <button onclick="resetSystem()">RESET</button>
  </div>

  <!-- CENTER -->
  <div class="center">
    <canvas id="graph" width="480" height="260"></canvas>
  </div>

  <!-- RIGHT -->
  <div class="right" id="log"></div>

</div>

<script>
let state = { FX: 0, DC: 0, CYB: 0, INF: 0 };
let log = [];

/* ---------------- RULE LAYER (HOOK) ---------------- */
const ruleLibrary = {
  FX: { threshold: 6, affects: { DC: 0.7 } },
  DC: { threshold: 6, affects: { CYB: 0.6 } },
  CYB:{ threshold: 6, affects: { INF: 0.5 } },
  INF: { threshold: 999, affects: {} }
};

/* ---------------- LOG ---------------- */
function push(msg) {
  const t = new Date().toLocaleTimeString();
  log.push(`[${t}] ${msg}`);
  document.getElementById("log").innerHTML =
    log.slice(-18).join("<br>");
}

/* ---------------- SCENARIO ---------------- */
function runScenario(type) {
  applyImpact(type, 2, "USER_EVENT");
  evaluate();
  draw();
}

/* ---------------- RULE-AWARE CASCADE ENGINE ---------------- */
function applyImpact(node, value, source) {
  state[node] += value;
  push(`${source} → ${node} +${value}`);

  const rule = ruleLibrary[node];
  if (!rule) return;

  // trigger rule-based cascade if threshold exceeded
  if (state[node] >= rule.threshold) {
    Object.entries(rule.affects).forEach(([target, factor]) => {
      const spill = Math.max(1, Math.floor(value * factor));
      applyImpact(target, spill, `RULE(${node})`);
    });
  }
}

/* ---------------- RESET ---------------- */
function resetSystem() {
  state = { FX: 0, DC: 0, CYB: 0, INF: 0 };
  push("SYSTEM RESET");
  evaluate();
  draw();
}

/* ---------------- STATUS ENGINE ---------------- */
function evaluate() {
  const total = Object.values(state).reduce((a,b)=>a+b,0);
  const s = document.getElementById("status");
  const body = document.body;

  body.classList.remove("stressed-flicker");

  if (total < 8) {
    s.textContent = "STABLE";
    s.className = "good";
  } else if (total < 18) {
    s.textContent = "DEGRADED";
    s.className = "warn";
  } else {
    s.textContent = "STRESSED";
    s.className = "bad";
    body.classList.add("stressed-flicker"); // visual layer restore
  }
}

/* ---------------- GRAPH (COCKPIT STYLE) ---------------- */
function draw() {
  const c = document.getElementById("graph");
  const x = c.getContext("2d");

  x.clearRect(0, 0, c.width, c.height);

  const keys = Object.keys(state);
  const vals = Object.values(state);
  const max = Math.max(...vals, 5);

  keys.forEach((k, i) => {
    const ratio = vals[i] / max;
    const bar = ratio * 210;
    const xpos = 60 + i * 100;

    // glow intensity (cockpit restoration)
    const glow = Math.min(255, vals[i] * 18);

    x.fillStyle = `rgb(${glow}, ${255 - glow}, 255)`;
    x.fillRect(xpos, 240 - bar, 40, bar);

    x.fillStyle = "#cfe8ff";
    x.fillText(k, xpos + 8, 255);
  });
}

/* INIT */
evaluate();
draw();
</script>

</body>
</html>
