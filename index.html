<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SPD v11.5 // OJK HYBRID DIGITAL TWIN</title>

<style>
body {
  margin: 0;
  background: #05070b;
  color: #cfe8ff;
  font-family: Arial, sans-serif;
  overflow: hidden;
}

/* HEADER */
.header {
  padding: 10px;
  background: #0b1220;
  font-size: 14px;
}

/* OJK PANEL */
.ojk {
  background: #0b1220;
  padding: 10px;
  font-size: 12px;
  border-bottom: 1px solid #1f3b5c;
}

/* STATUS */
#statusBar {
  text-align:center;
  padding:6px;
  background:#0a0f18;
  font-size:13px;
}

/* LAYOUT */
.panel {
  display:flex;
  justify-content:space-around;
  padding:10px;
}

.card {
  background:#0e1a2b;
  padding:12px;
  width:22%;
  text-align:center;
}

/* GRAPH */
#graph {
  position: relative;
  height: 220px;
  margin: 10px;
}

.node {
  position:absolute;
  width:50px;
  height:50px;
  border-radius:50%;
  background:#1f3b5c;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:12px;
  transition:0.3s;
}

.edge {
  position:absolute;
  height:2px;
  background:#2a4d77;
  transform-origin:left center;
}

/* BUTTONS */
.buttons {
  text-align:center;
  margin:8px;
}

button {
  padding:6px 10px;
  margin:3px;
  background:#1f3b5c;
  color:white;
  border:none;
}

/* AUDIT */
#audit {
  position:absolute;
  bottom:0;
  width:100%;
  height:120px;
  background:#0a0f18;
  overflow-y:auto;
  font-size:11px;
  padding:8px;
}
</style>
</head>

<body>

<div class="header">
🛰 SPD v11.5 // HYBRID OJK DIGITAL TWIN COCKPIT
</div>

<div class="ojk">
<b>OJK SANDBOX MODE</b> — Non-execution systemic risk simulation  
<select id="scenarioSelect">
  <option>BOND_CRISIS</option>
  <option>CYBER_WAR</option>
  <option>GRID_FAILURE</option>
</select>

<button onclick="runScenario()">Run Scenario</button>
<button onclick="toggleExplain()">Explain</button>
<button onclick="exportAudit()">Export</button>
</div>

<div id="statusBar">STATUS: READY</div>

<!-- VALUES -->
<div class="panel">
  <div class="card">FX<div id="FX"></div></div>
  <div class="card">DC<div id="DC"></div></div>
  <div class="card">CYB<div id="CYB"></div></div>
  <div class="card">INF<div id="INF"></div></div>
</div>

<!-- GRAPH -->
<div id="graph">
  <div class="node" id="nFX">FX</div>
  <div class="node" id="nDC">DC</div>
  <div class="node" id="nCYB">CYB</div>
  <div class="node" id="nINF">INF</div>

  <div class="edge" id="eFXDC"></div>
  <div class="edge" id="eDCCYB"></div>
  <div class="edge" id="eCYBINF"></div>
  <div class="edge" id="eINFFX"></div>
</div>

<div class="buttons">
  <button onclick="inject('FX')">FX STRESS</button>
  <button onclick="inject('DC')">DC LOAD</button>
  <button onclick="inject('CYB')">CYBER EVENT</button>
  <button onclick="inject('INF')">INFRA STRAIN</button>
  <button onclick="reset()">RESET</button>
</div>

<div id="audit"></div>

<script>

/* ================= CORE STATE ================= */

const NODES = {
  FX:{v:0,s:0.7,x:80,y:80},
  DC:{v:0,s:0.9,x:220,y:40},
  CYB:{v:0,s:0.8,x:360,y:80},
  INF:{v:0,s:0.85,x:220,y:140}
};

/* LINKS */
const LINKS = [
  ["FX","DC"],
  ["DC","CYB"],
  ["CYB","INF"],
  ["INF","FX"]
];

/* SCENARIOS */
const SCENARIOS = {
  BOND_CRISIS:{FX:35,DC:10,CYB:5},
  CYBER_WAR:{CYB:40,DC:25,INF:10},
  GRID_FAILURE:{INF:50,DC:20,FX:15}
};

let log=[];

/* ================= ENGINE ================= */

function inject(n){
  NODES[n].v += 10;
  audit("INJECT",{n});
}

function runScenario(){
  const s = SCENARIOS[document.getElementById("scenarioSelect").value];
  for(let k in s) NODES[k].v += s[k];
  audit("SCENARIO",s);
}

function cascade(){
  LINKS.forEach(([a,b])=>{
    const A=NODES[a], B=NODES[b];
    const p = (A.v * A.s * B.s)/120;

    if(Math.random()<p){
      B.v += 4;
      audit("CASCADE",{from:a,to:b});
    }
  });
}

function decay(){
  for(let k in NODES){
    NODES[k].v *= 0.97;
  }
}

function tick(){
  cascade();
  decay();
  render();
}

setInterval(tick,1000);

/* ================= GRAPH ================= */

const POS = {
  FX:{x:80,y:80},
  DC:{x:220,y:40},
  CYB:{x:360,y:80},
  INF:{x:220,y:140}
};

function renderGraph(){

  for(let k in NODES){
    let n=NODES[k];
    let el=document.getElementById("n"+k);

    el.style.left=POS[k].x+"px";
    el.style.top=POS[k].y+"px";
    el.style.transform=`scale(${1+n.v/50})`;

    el.style.background =
      n.v>40?"#ff3b3b":
      n.v>20?"#ffb020":
      "#1f3b5c";

    el.innerText = k+" "+n.v.toFixed(0);
  }
}

/* ================= UI ================= */

function render(){
  FX.innerText=NODES.FX.v.toFixed(1);
  DC.innerText=NODES.DC.v.toFixed(1);
  CYB.innerText=NODES.CYB.v.toFixed(1);
  INF.innerText=NODES.INF.v.toFixed(1);

  renderGraph();

  audit.innerHTML = log.slice(-10).map(e=>
    `[${e.type}] ${JSON.stringify(e.data)}`
  ).join("<br>");
}

/* ================= AUDIT ================= */

function audit(type,data){
  log.push({time:new Date().toISOString(),type,data});
}

/* ================= UTIL ================= */

function reset(){
  for(let k in NODES) NODES[k].v=0;
}

function toggleExplain(){
  alert("Explain mode toggled (UI hook ready)");
}

function exportAudit(){
  const a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob([JSON.stringify(log,null,2)]));
  a.download="spd_v11_5_audit.json";
  a.click();
}

/* INIT */
render();

</script>

</body>
</html>
