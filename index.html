<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SPD v11.4 // DIGITAL TWIN GRAPH CORE</title>

<style>
body {
  margin: 0;
  background: #05070b;
  color: #cfe8ff;
  font-family: Arial, sans-serif;
  overflow: hidden;
}

.header {
  padding: 12px;
  background: #0b1220;
  font-size: 14px;
}

/* STATUS */
#statusBar {
  text-align:center;
  padding:8px;
  background:#0a0f18;
  font-size:13px;
}

/* PANELS */
.panel {
  display:flex;
  justify-content:space-around;
  padding:20px;
}

.card {
  background:#0e1a2b;
  width:20%;
  padding:20px;
  text-align:center;
  border-radius:8px;
}

.value { font-size:26px; }

/* GRAPH */
#graph {
  position: relative;
  height: 220px;
  margin: 10px;
}

.node {
  position: absolute;
  width: 60px;
  height: 60px;
  border-radius: 50%;
  background: #1f3b5c;
  display:flex;
  align-items:center;
  justify-content:center;
  transition: all 0.3s;
  font-size:12px;
  z-index:2;
}

.edge {
  position:absolute;
  height:2px;
  background:#2a4d77;
  transform-origin:left center;
  z-index:1;
}

/* BUTTONS */
.buttons {
  text-align:center;
  margin:10px;
}

button {
  padding:8px 12px;
  margin:4px;
  background:#1f3b5c;
  color:white;
  border:none;
  cursor:pointer;
}

button:hover { background:#2a4d77; }

/* AUDIT */
#audit {
  position:absolute;
  bottom:0;
  width:100%;
  height:130px;
  background:#0a0f18;
  overflow-y:auto;
  font-size:12px;
  padding:10px;
}
</style>
</head>

<body>

<div class="header">
🛰 SPD v11.4 // PROBABILISTIC DIGITAL TWIN GRAPH CORE
</div>

<div id="statusBar">STATUS: READY</div>

<div class="panel">
  <div class="card">FX<div class="value" id="FX"></div></div>
  <div class="card">DC<div class="value" id="DC"></div></div>
  <div class="card">CYB<div class="value" id="CYB"></div></div>
  <div class="card">INF<div class="value" id="INF"></div></div>
</div>

<div id="graph">
  <div id="node_FX" class="node">FX</div>
  <div id="node_DC" class="node">DC</div>
  <div id="node_CYB" class="node">CYB</div>
  <div id="node_INF" class="node">INF</div>

  <div id="edge_FXDC" class="edge"></div>
  <div id="edge_DCCYB" class="edge"></div>
  <div id="edge_CYBINF" class="edge"></div>
  <div id="edge_INFFX" class="edge"></div>
</div>

<div class="buttons">
  <button onclick="trigger('FX')">FX STRESS</button>
  <button onclick="trigger('DC')">DC LOAD</button>
  <button onclick="trigger('CYB')">CYBER EVENT</button>
  <button onclick="trigger('INF')">INFRA STRAIN</button>
  <button onclick="reset()">RESET</button>
</div>

<div id="audit"></div>

<script>

/* ================= STATE ================= */

const NODES = {
  FX:{v:0,s:0.7,x:80,y:80},
  DC:{v:0,s:0.9,x:220,y:40},
  CYB:{v:0,s:0.8,x:360,y:80},
  INF:{v:0,s:0.85,x:220,y:140}
};

const LINKS = [
  ["FX","DC"],
  ["DC","CYB"],
  ["CYB","INF"],
  ["INF","FX"]
];

let log=[];

/* ================= ENGINE ================= */

function trigger(n){
  NODES[n].v += 10;
  audit("USER",{n});
}

function cascade(){
  LINKS.forEach(([a,b])=>{
    const A=NODES[a], B=NODES[b];

    const p = (A.v * A.s * B.s) / 120;

    if(Math.random() < p){
      B.v += 4;
      audit("CASCADE",{from:a,to:b,p:p.toFixed(3)});
    }
  });
}

function decay(){
  for(let k in NODES){
    NODES[k].v *= 0.97;
  }
}

function tick(){
  cascade();
  decay();
  render();
}

setInterval(tick,1000);

/* ================= GRAPH ================= */

function renderGraph(){

  for(let k in NODES){
    const n=NODES[k];
    const el=document.getElementById("node_"+k);

    const size = 40 + n.v;
    el.style.left = n.x+"px";
    el.style.top = n.y+"px";
    el.style.width = size+"px";
    el.style.height = size+"px";

    el.style.background =
      n.v>40?"#ff3b3b":
      n.v>20?"#ffb020":
      "#1f3b5c";

    el.innerText = k+" "+n.v.toFixed(0);
  }

  LINKS.forEach(([a,b])=>{
    const A=NODES[a], B=NODES[b];
    const el=document.getElementById("edge_"+a+b);

    const dx=B.x-A.x;
    const dy=B.y-A.y;
    const len=Math.sqrt(dx*dx+dy*dy);
    const ang=Math.atan2(dy,dx)*180/Math.PI;

    el.style.width=len+"px";
    el.style.left=A.x+"px";
    el.style.top=A.y+"px";
    el.style.transform=`rotate(${ang}deg)`;
  });
}

/* ================= UI ================= */

function render(){
  FX.innerText=NODES.FX.v.toFixed(1);
  DC.innerText=NODES.DC.v.toFixed(1);
  CYB.innerText=NODES.CYB.v.toFixed(1);
  INF.innerText=NODES.INF.v.toFixed(1);

  renderGraph();

  audit.innerHTML=log.slice(-10).map(e=>
    `[${e.type}] ${JSON.stringify(e.data)}`
  ).join("<br>");
}

function reset(){
  for(let k in NODES) NODES[k].v=0;
  audit("RESET",{});
}

/* ================= AUDIT ================= */

function audit(type,data){
  log.push({type,data,time:new Date().toISOString()});
}

/* INIT */
render();

</script>

</body>
</html>
