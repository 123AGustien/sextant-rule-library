<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SPD v12 // FULL AUTONOMOUS SCENARIO COCKPIT</title>

<style>
body{
margin:0;
background:#05070b;
color:#cfe8ff;
font-family:Arial;
}

.header{
padding:10px;
background:#0b1220;
text-align:center;
font-weight:bold;
}

#statusBar{
text-align:center;
padding:6px;
background:#0a0f18;
}

.panel{
display:flex;
justify-content:space-around;
padding:10px;
}

.card{
background:#0e1a2b;
width:22%;
padding:10px;
border-radius:6px;
text-align:center;
}

.value{font-size:24px;}

button{
margin:3px;
padding:6px;
background:#1f3b5c;
color:white;
border:none;
cursor:pointer;
}

#scenarioPanel{
padding:10px;
text-align:center;
font-size:12px;
background:#0a0f18;
margin:10px;
}

#log{
position:absolute;
right:10px;
top:180px;
width:340px;
height:340px;
overflow:auto;
background:#0a0f18;
padding:10px;
font-size:11px;
border-left:2px solid #1f3b5c;
}
</style>
</head>

<body>

<div class="header">🛰 SPD v12 // FULL AUTONOMOUS SCENARIO COCKPIT</div>

<div id="statusBar">STATUS: INITIALIZING</div>

<!-- CONTROL PANEL -->
<div class="panel">
<div class="card">FX <div id="FX" class="value">0</div></div>
<div class="card">DC <div id="DC" class="value">0</div></div>
<div class="card">CYB <div id="CYB" class="value">0</div></div>
<div class="card">INF <div id="INF" class="value">0</div></div>
</div>

<!-- ACTION MAP -->
<div style="text-align:center">
<button onclick="inject('FX')">FX STRESS</button>
<button onclick="inject('DC')">DC LOAD</button>
<button onclick="inject('CYB')">CYBER EVENT</button>
<button onclick="inject('INF')">INFRA STRAIN</button>
<button onclick="resetAll()">RESET</button>
</div>

<!-- SCENARIO PANEL -->
<div id="scenarioPanel">
SCENARIO PANEL: READY<br>
<span id="scenarioText">No active scenario</span>
</div>

<div id="log"></div>

<script>

/* =========================
STATE STORE
========================= */

const state = {
FX:0,
DC:0,
CYB:0,
INF:0
};

/* =========================
RULE ENGINE
========================= */

const rules = {
FX:1.0,
DC:0.9,
CYB:1.2,
INF:1.1
};

/* =========================
SCENARIO MAP (MEANING LAYER)
========================= */

const scenarioMap = {
FX:{
name:"Financial Stress Injection",
desc:"Market + liquidity volatility event simulated",
risk:"MEDIUM",
effect:"impacts DC liquidity + CYB sensitivity"
},
DC:{
name:"Data Center Load Spike",
desc:"Compute saturation and latency pressure",
risk:"MEDIUM-HIGH",
effect:"triggers INF strain propagation"
},
CYB:{
name:"Cyber Event Triggered",
desc:"Security anomaly injected into system",
risk:"HIGH",
effect:"corrupts INF stability and DC reliability"
},
INF:{
name:"Infrastructure Strain Event",
desc:"Physical system stress escalation",
risk:"HIGH",
effect:"feedback into FX instability loop"
}
};

/* =========================
LINKS (CASCADE NETWORK)
========================= */

const links = [
["FX","DC"],
["DC","CYB"],
["CYB","INF"],
["INF","FX"]
];

let log = [];

/* =========================
LOG ENGINE
========================= */

function addLog(msg){
log.push(msg);
document.getElementById("log").innerHTML =
log.slice(-18).map(x=>"> "+x).join("<br>");
}

/* =========================
SCENARIO ACTION
========================= */

function inject(n){

state[n] += 10;

let s = scenarioMap[n];

document.getElementById("scenarioText").innerHTML =
"▶ " + s.name +
"<br>• " + s.desc +
"<br>• Risk: " + s.risk +
"<br>• Effect: " + s.effect;

addLog("SCENARIO INIT → " + s.name);

evaluate();
}

/* =========================
RISK MODEL
========================= */

function riskScore(){
return (
state.FX*rules.FX +
state.DC*rules.DC +
state.CYB*rules.CYB +
state.INF*rules.INF
)/4;
}

/* =========================
CASCADE ENGINE
========================= */

function cascade(){
links.forEach(([a,b])=>{
let p = (state[a]*rules[a]*rules[b])/120;

if(Math.random()<p){
let imp = 2 + Math.random()*4;
state[b]+=imp;
addLog(`CASCADE → ${a} → ${b} (+${imp.toFixed(1)})`);
}
});
}

/* =========================
DECAY ENGINE
========================= */

function decay(){
for(let k in state){
state[k]*=0.97;
if(state[k]<0) state[k]=0;
}
}

/* =========================
SOLUTION ENGINE
========================= */

function solution(){
addLog("🧩 SOLUTION ENGINE ACTIVATED");

for(let k in state){
state[k]*=0.7;
}

addLog("SYSTEM STABILIZED");
}

/* =========================
EVALUATION ENGINE
========================= */

function evaluate(){

let r = riskScore();
let status = "STABLE";

if(r > 60){
status = "CRITICAL";
solution();
}
else if(r > 30){
status = "DEGRADED";
}

document.getElementById("statusBar").innerText =
"STATUS: " + status;
}

/* =========================
RENDER ENGINE
========================= */

function render(){
FX.innerText = state.FX.toFixed(1);
DC.innerText = state.DC.toFixed(1);
CYB.innerText = state.CYB.toFixed(1);
INF.innerText = state.INF.toFixed(1);
}

/* =========================
MAIN LOOP
========================= */

function tick(){
cascade();
decay();
evaluate();
render();
}

setInterval(tick,1000);

/* =========================
RESET
========================= */

function resetAll(){
for(let k in state) state[k]=0;
addLog("SYSTEM RESET");
}

/* INIT */
render();

</script>

</body>
</html>
