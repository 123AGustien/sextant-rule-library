<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SPD COCKPIT HUD</title>

<style>
body {
  margin: 0;
  background: #04070b;
  color: #cfe8ff;
  font-family: Arial, sans-serif;
  overflow: hidden;
}

/* TOP STRIP */
.top {
  height: 38px;
  background: #0a111a;
  border-bottom: 1px solid #1b2a3a;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 12px;
  font-size: 12px;
  letter-spacing: 0.5px;
}

/* MAIN GRID - COMPACT HUD */
.grid {
  display: grid;
  grid-template-columns: 200px 1fr 240px;
  height: calc(100vh - 38px);
}

/* LEFT HUD PANEL */
.left {
  background: #070d14;
  border-right: 1px solid #1b2a3a;
  padding: 8px;
}

button {
  width: 100%;
  margin-bottom: 6px;
  padding: 8px;
  background: #0f1b28;
  border: 1px solid #223548;
  color: #d6ecff;
  font-size: 11px;
  cursor: pointer;
}

button:hover {
  background: #16283a;
}

/* CENTER HUD */
.center {
  display: flex;
  align-items: center;
  justify-content: center;
  background: #050b12;
}

canvas {
  background: #070f18;
  border: 1px solid #1c2c3c;
}

/* RIGHT TELEMETRY */
.right {
  background: #070d14;
  border-left: 1px solid #1b2a3a;
  padding: 8px;
  font-size: 11px;
  overflow-y: auto;
  line-height: 1.4;
}

/* STATUS COLORS */
.good { color: #3dffb5; }
.warn { color: #ffd166; }
.bad  { color: #ff4d6d; }

.status {
  font-size: 11px;
}
</style>
</head>

<body>

<div class="top">
  <div>🛰 SPD COCKPIT HUD // SIM ENGINE</div>
  <div id="status" class="status good">STABLE</div>
</div>

<div class="grid">

  <!-- LEFT CONTROLS -->
  <div class="left">
    <button onclick="runScenario('FX')">FX STRESS</button>
    <button onclick="runScenario('DC')">DC LOAD</button>
    <button onclick="runScenario('CYB')">CYBER HIT</button>
    <button onclick="runScenario('INF')">INFRA STRAIN</button>
    <button onclick="reset()">RESET</button>
  </div>

  <!-- CENTER GRAPH -->
  <div class="center">
    <canvas id="graph" width="480" height="260"></canvas>
  </div>

  <!-- RIGHT TELEMETRY -->
  <div class="right" id="log"></div>

</div>

<script>
let state = { FX: 0, DC: 0, CYB: 0, INF: 0 };
let log = [];

function push(msg) {
  const t = new Date().toLocaleTimeString();
  log.push(`[${t}] ${msg}`);
  document.getElementById("log").innerHTML = log.slice(-18).join("<br>");
}

function runScenario(type) {
  state[type] += 2;
  push("EVENT >> " + type);
  evaluate();
  draw();
}

function reset() {
  state = { FX: 0, DC: 0, CYB: 0, INF: 0 };
  push("SYSTEM RESET");
  evaluate();
  draw();
}

function evaluate() {
  const total = Object.values(state).reduce((a,b)=>a+b,0);
  const s = document.getElementById("status");

  if (total < 8) {
    s.textContent = "STABLE";
    s.className = "status good";
  } else if (total < 15) {
    s.textContent = "DEGRADED";
    s.className = "status warn";
  } else {
    s.textContent = "STRESSED";
    s.className = "status bad";
  }
}

function draw() {
  const c = document.getElementById("graph");
  const x = c.getContext("2d");

  x.clearRect(0,0,c.width,c.height);

  const keys = Object.keys(state);
  const vals = Object.values(state);
  const max = Math.max(...vals, 5);

  keys.forEach((k,i)=>{
    const bar = (vals[i]/max)*210;
    const xpos = 60 + i*100;

    x.fillStyle = "#00ffd5";
    x.fillRect(xpos, 240-bar, 40, bar);

    x.fillStyle = "#cfe8ff";
    x.fillText(k, xpos+8, 255);
  });
}

evaluate();
draw();
</script>

</body>
</html>
